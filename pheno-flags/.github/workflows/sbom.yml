name: sbom
on:
  push:
    branches: [main]
  pull_request:
jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM
        run: cargo cyclonedx --format json --override-filename sbom
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: target/sbom.json
      - name: Check for license violations
        run: |
          python3 -c "
          import json, sys
          with open('target/sbom.json') as f:
              sbom = json.load(f)
          forbidden = ['GPL', 'AGPL', 'SSPL']
          violations = []
          for comp in sbom.get('components', []):
              for lic in (comp.get('licenses') or []):
                  lic_str = lic.get('license', {}).get('id', '') or lic.get('license', {}).get('name', '')
                  for f in forbidden:
                      if f in lic_str:
                          violations.append(f\"{comp['name']}: {lic_str}\")
          if violations:
              print('FORBIDDEN LICENSES DETECTED:')
              for v in violations:
                  print('  ' + v)
              sys.exit(1)
          print('License check passed: no GPL/AGPL/SSPL found')
          "
