# Cross-compilation targets — omniroute-rust
#
# Add new targets via:
#   rustup target add <target-triple>
#
# For Linux cross-compilation from macOS, install the cross tool:
#   cargo install cross
# Then:
#   cross build --release --target x86_64-unknown-linux-gnu
#   cross build --release --target aarch64-unknown-linux-gnu

[target.aarch64-apple-darwin]
# macOS ARM64 (Apple Silicon) — native target for M1/M2/M3/M4 Macs.
# Build locally with: cargo build --target aarch64-apple-darwin

[target.x86_64-unknown-linux-gnu]
# Linux x86_64 — primary deployment target for VPS and cloud VMs.
# Linker: use `gcc` or `clang` with x86_64 cross-toolchain.
# On macOS: requires `cross` or a Docker-based toolchain.
#   brew messes with cross-compilation; prefer `cross build`.

[target.aarch64-unknown-linux-gnu]
# Linux ARM64 — deployment on AWS Graviton, Raspberry Pi 5, or
# ARM-based cloud instances.
# Linker: `aarch64-linux-gnu-gcc` from cross-toolchain.
# On macOS: `brew install aarch64-unknown-linux-gnu-gcc` or use `cross build`.

[alias]
# Shorthand aliases for common cross-compile workflows.
build-macos-arm   = "build --release --target aarch64-apple-darwin"
build-linux-amd64 = "build --release --target x86_64-unknown-linux-gnu"
build-linux-arm64 = "build --release --target aarch64-unknown-linux-gnu"
build-all-cross   = "build --release --target aarch64-apple-darwin --target x86_64-unknown-linux-gnu --target aarch64-unknown-linux-gnu"
