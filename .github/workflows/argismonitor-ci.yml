name: argismonitor-ci

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches: [feat/v4-svelte-hono-monorepo, main]
  pull_request:
    branches: [feat/v4-svelte-hono-monorepo, main]
  workflow_dispatch:

jobs:
  v4-build-test:
    name: Build + test v4 stack
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Install v4 app deps
        run: |
          bun install --frozen-lockfile --cwd packages/api-contracts --ignore-scripts
          bun install --frozen-lockfile --cwd packages/design-tokens --ignore-scripts
          bun install --frozen-lockfile --cwd apps/bff --ignore-scripts
          bun install --frozen-lockfile --cwd apps/web --ignore-scripts
      - name: Build web
        run: cd apps/web && bunx svelte-kit sync && bun run build
      - name: Build bff
        run: cd apps/bff && bun run build
      - name: Run unit tests
        run: cd packages/api-contracts && bun test
      - name: Run proccompose unit tests
        continue-on-error: true
        run: cd proccompose && bash tests/proccompose.test.sh
      - name: Run proccompose CI mode
        continue-on-error: true
        env:
          bff_port: 14322
        run: |
          cd proccompose
          mkdir -p $HOME/.argismonitor.ci
          bff_port=$bff_port proccompose ci
