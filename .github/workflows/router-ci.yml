# Router CI — runs scorecard on every PR and pushes artifacts to OCI.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  scorecard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Run fleet scorecard
        run: |
          bash tools/pillar-fleet/scorecard.sh > scorecard-$(date +%F).md
      - name: Upload scorecard artifact
        uses: actions/upload-artifact@v4
        with:
          name: fleet-scorecard
          path: scorecard-*.md
          retention-days: 90
