name: CI
permissions:
  contents: read
  pull-requests: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Only run when actual code changes — skip README/docs-only edits
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'worklogs/**'
      - '.github/**'
      - '*.md'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'worklogs/**'
      - '.github/**'
      - '*.md'

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.1.1
      - uses: dtolnay/rust-toolchain@stable

      # sccache — share compiled artifacts across CI runs
      - name: Start sccache
        run: |
          cargo install sccache --locked
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            . -> target

      - name: Clone sibling PhenoObservability
        run: |
          git clone --depth 1 https://github.com/KooshaPari/PhenoObservability.git \
            "$GITHUB_WORKSPACE/../PhenoObservability"

      # cargo-nextest — 2-3x faster than cargo test
      - name: Install cargo-nextest
        run: |
          if ! cargo nextest --version &>/dev/null; then
            cargo install cargo-nextest --locked
          fi

      - name: Run tests (nextest)
        run: cargo nextest run --all-features --workspace

      - name: Run lint
        run: cargo clippy --all-features -- -D warnings