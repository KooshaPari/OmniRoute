name: ci

on:
  push:
    branches: [main, feat/**, phase-*]
  pull_request:
    branches: [main, feat/**, phase-*]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bun-version-parity:
    name: Bun version parity
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun scripts/check/check-v4-bun-version.mjs

  lint:
    name: Lint (oxlint)
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install v4 app deps
        run: |
          bun install --frozen-lockfile --cwd packages/api-contracts --ignore-scripts
          bun install --frozen-lockfile --cwd packages/design-tokens --ignore-scripts
          bun install --frozen-lockfile --cwd apps/bff --ignore-scripts
          bun install --frozen-lockfile --cwd apps/web --ignore-scripts
          bun install --frozen-lockfile --cwd apps/desktop --ignore-scripts
      - run: bun run ci:v4:lint

  typecheck:
    name: Typecheck
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install v4 app deps
        run: |
          bun install --frozen-lockfile --cwd packages/api-contracts --ignore-scripts
          bun install --frozen-lockfile --cwd packages/design-tokens --ignore-scripts
          bun install --frozen-lockfile --cwd apps/bff --ignore-scripts
          bun install --frozen-lockfile --cwd apps/web --ignore-scripts
          bun install --frozen-lockfile --cwd apps/desktop --ignore-scripts
      - run: cd apps/web && bunx svelte-kit sync
      - run: bun run ci:v4:typecheck

  typecheck-ts7-parity:
    name: Typecheck (TypeScript 7 parity)
    runs-on: [self-hosted, linux, x64]
    continue-on-error: true
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install v4 app deps
        run: |
          bun install --frozen-lockfile --cwd packages/api-contracts --ignore-scripts
          bun install --frozen-lockfile --cwd packages/design-tokens --ignore-scripts
          bun install --frozen-lockfile --cwd apps/bff --ignore-scripts
          bun install --frozen-lockfile --cwd apps/web --ignore-scripts
      - run: cd apps/web && bun run svelte-kit sync
      - run: bun run ci:v4:typecheck:ts7

  test:
    name: Unit + component tests
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install v4 app deps
        run: |
          bun install --frozen-lockfile --cwd packages/api-contracts --ignore-scripts
          bun install --frozen-lockfile --cwd packages/design-tokens --ignore-scripts
          bun install --frozen-lockfile --cwd apps/bff --ignore-scripts
          bun install --frozen-lockfile --cwd apps/web --ignore-scripts
          bun install --frozen-lockfile --cwd apps/desktop --ignore-scripts
      - name: Run v4 package tests
        run: |
          bun test --cwd packages/api-contracts
          bun run --cwd apps/bff test

  build-web:
    name: Build web (SvelteKit)
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install v4 app deps
        run: |
          bun install --frozen-lockfile --cwd packages/api-contracts --ignore-scripts
          bun install --frozen-lockfile --cwd packages/design-tokens --ignore-scripts
          bun install --frozen-lockfile --cwd apps/bff --ignore-scripts
          bun install --frozen-lockfile --cwd apps/web --ignore-scripts
          bun install --frozen-lockfile --cwd apps/desktop --ignore-scripts
      - run: cd apps/web && bunx svelte-kit sync && bun run build

  build-bff:
    name: Build BFF (Hono)
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install v4 app deps
        run: |
          bun install --frozen-lockfile --cwd packages/api-contracts --ignore-scripts
          bun install --frozen-lockfile --cwd packages/design-tokens --ignore-scripts
          bun install --frozen-lockfile --cwd apps/bff --ignore-scripts
          bun install --frozen-lockfile --cwd apps/web --ignore-scripts
          bun install --frozen-lockfile --cwd apps/desktop --ignore-scripts
      - run: cd apps/bff && bun run build

  build-desktop:
    name: Cargo check (Tauri 2)
    runs-on: [self-hosted, macos, arm64]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: dtolnay/rust-toolchain@stable
      - name: Install v4 app deps
        run: |
          bun install --frozen-lockfile --cwd packages/api-contracts --ignore-scripts
          bun install --frozen-lockfile --cwd packages/design-tokens --ignore-scripts
          bun install --frozen-lockfile --cwd apps/bff --ignore-scripts
          bun install --frozen-lockfile --cwd apps/web --ignore-scripts
          bun install --frozen-lockfile --cwd apps/desktop --ignore-scripts
      - run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml

  build-desktop-linux:
    name: Cargo check (Tauri 2, Linux)
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: dtolnay/rust-toolchain@stable
      - name: Install v4 app deps
        run: |
          bun install --frozen-lockfile --cwd packages/api-contracts --ignore-scripts
          bun install --frozen-lockfile --cwd packages/design-tokens --ignore-scripts
          bun install --frozen-lockfile --cwd apps/bff --ignore-scripts
          bun install --frozen-lockfile --cwd apps/web --ignore-scripts
          bun install --frozen-lockfile --cwd apps/desktop --ignore-scripts
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml

  build-desktop-windows:
    name: Cargo check (Tauri 2, Windows)
    runs-on: [self-hosted, windows, x64]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: dtolnay/rust-toolchain@stable
      - name: Install v4 app deps
        run: |
          bun install --frozen-lockfile --cwd packages/api-contracts --ignore-scripts
          bun install --frozen-lockfile --cwd packages/design-tokens --ignore-scripts
          bun install --frozen-lockfile --cwd apps/bff --ignore-scripts
          bun install --frozen-lockfile --cwd apps/web --ignore-scripts
          bun install --frozen-lockfile --cwd apps/desktop --ignore-scripts
      - run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml

  size-budget:
    name: Legacy bundle size budget
    # Root Size Limit plugins are intentionally not installed by the v4
    # package-local setup. Enable only while the legacy root validation stack
    # is provisioned; #319 tracks its migration to v4.
    if: vars.ENABLE_LEGACY_ROOT_VALIDATION == 'true'
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 5
    needs: [build-web, build-bff]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install v4 app deps
        run: |
          bun install --frozen-lockfile --cwd packages/api-contracts --ignore-scripts
          bun install --frozen-lockfile --cwd packages/design-tokens --ignore-scripts
          bun install --frozen-lockfile --cwd apps/bff --ignore-scripts
          bun install --frozen-lockfile --cwd apps/web --ignore-scripts
          bun install --frozen-lockfile --cwd apps/desktop --ignore-scripts
      - run: bunx size-limit

  e2e:
    name: Legacy E2E (Playwright)
    # Root Playwright config and fixtures require the legacy root install.
    # #319 owns their package-local replacement.
    if: vars.ENABLE_LEGACY_ROOT_VALIDATION == 'true'
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 20
    needs: [build-web, build-bff]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install v4 app deps
        run: |
          bun install --frozen-lockfile --cwd packages/api-contracts --ignore-scripts
          bun install --frozen-lockfile --cwd packages/design-tokens --ignore-scripts
          bun install --frozen-lockfile --cwd apps/bff --ignore-scripts
          bun install --frozen-lockfile --cwd apps/web --ignore-scripts
          bun install --frozen-lockfile --cwd apps/desktop --ignore-scripts
      - run: bunx playwright install --with-deps chromium
      - run: bun run test:e2e

  a11y:
    name: Legacy a11y (axe-core)
    # Root axe fixtures require the legacy root install. Keep this explicit
    # rather than reporting a dependency-resolution failure as a test result.
    if: vars.ENABLE_LEGACY_ROOT_VALIDATION == 'true'
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15
    needs: [build-web, build-bff]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install v4 app deps
        run: |
          bun install --frozen-lockfile --cwd packages/api-contracts --ignore-scripts
          bun install --frozen-lockfile --cwd packages/design-tokens --ignore-scripts
          bun install --frozen-lockfile --cwd apps/bff --ignore-scripts
          bun install --frozen-lockfile --cwd apps/web --ignore-scripts
          bun install --frozen-lockfile --cwd apps/desktop --ignore-scripts
      - run: cd apps/web && bunx svelte-kit sync && bun run build
      - run: cd apps/bff && bun run build
      - run: bunx playwright install --with-deps chromium
      - run: bunx playwright test tests/a11y/

  lighthouse:
    name: Lighthouse CI
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15
    needs: [build-web]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install v4 app deps
        run: |
          bun install --frozen-lockfile --cwd packages/api-contracts --ignore-scripts
          bun install --frozen-lockfile --cwd packages/design-tokens --ignore-scripts
          bun install --frozen-lockfile --cwd apps/bff --ignore-scripts
          bun install --frozen-lockfile --cwd apps/web --ignore-scripts
          bun install --frozen-lockfile --cwd apps/desktop --ignore-scripts
      - run: cd apps/web && bunx svelte-kit sync && bun run build
      - run: cd apps/web && bun run preview &
      - run: sleep 5
      - run: bunx lhci autorun

  release-macos:
    name: Release macOS (sign + notarize)
    runs-on: [self-hosted, macos, arm64]
    timeout-minutes: 30
    needs: [build-web, build-bff, build-desktop, a11y]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.14 }
      - uses: dtolnay/rust-toolchain@stable
      - name: Install v4 app deps
        run: |
          bun install --frozen-lockfile --cwd packages/api-contracts --ignore-scripts
          bun install --frozen-lockfile --cwd packages/design-tokens --ignore-scripts
          bun install --frozen-lockfile --cwd apps/bff --ignore-scripts
          bun install --frozen-lockfile --cwd apps/web --ignore-scripts
          bun install --frozen-lockfile --cwd apps/desktop --ignore-scripts
      - uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      - name: Build signed DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd apps/desktop
          cargo tauri build --target aarch64-apple-darwin --target x86_64-apple-darwin
          ./scripts/notarize.sh src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/OmniRoute_0.1.0_aarch64.dmg
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

  release-windows:
    name: Release Windows (Azure Trusted Signing)
    runs-on: [self-hosted, windows, x64]
    timeout-minutes: 30
    needs: [build-web, build-bff, build-desktop, a11y]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.14 }
      - uses: dtolnay/rust-toolchain@stable
      - env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: cargo tauri build
      - uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/src-tauri/target/release/bundle/{msi,nsis}/*

  release-linux:
    name: Release Linux (.deb, .rpm, AppImage, Tauri updater)
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 30
    needs: [build-web, build-bff, build-desktop, a11y]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.14 }
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - run: cargo tauri build
      - uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/src-tauri/target/release/bundle/{deb,rpm,appimage}/*

