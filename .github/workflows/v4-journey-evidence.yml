name: v4 journey evidence proof

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/v4-journey-evidence.yml"
      - "tests/e2e/journey-evidence-smoke.spec.ts"
      - "tests/unit/journey-accessibility-report.test.ts"
      - "scripts/docs/validate-journey-accessibility-report.mjs"
      - "apps/web/**"
      - "apps/bff/**"
      - "packages/api-contracts/**"
      - "playwright.config.ts"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: v4-journey-evidence-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  capture:
    if: ${{ github.event_name != 'push' && (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'ci-billing-exception')) }}
    name: Capture anonymous home smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:4321
      BFF_ORIGIN: http://127.0.0.1:4322
      NO_COLOR: "1"
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install locked dependencies
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          # The root devDependency installs an uninitialized Bun npm shim when
          # scripts are disabled. Remove it so the pinned setup-bun binary is
          # not shadowed during package-local build and start scripts.
          rm -rf node_modules/bun node_modules/.bin/bun
          test "$(bun --version)" = "1.3.14"
          bun install --frozen-lockfile --cwd packages/api-contracts --ignore-scripts
          bun install --frozen-lockfile --cwd apps/bff --ignore-scripts
          bun install --frozen-lockfile --cwd apps/web --ignore-scripts

      - name: Install Chromium
        run: bunx playwright install --with-deps chromium

      - name: Build v4 services
        run: |
          cd apps/web
          bunx svelte-kit sync
          bun run build
          cd ../bff
          bun run build

      - name: Start BFF and web preview
        run: |
          mkdir -p journey-evidence/service-logs
          setsid bash -c 'cd apps/bff && exec env PORT=4322 bun dist/index.js' >journey-evidence/service-logs/bff.log 2>&1 &
          echo $! > journey-evidence/service-logs/bff.pid
          setsid bash -c 'cd apps/web && exec env HOST=127.0.0.1 PORT=4321 BFF_ORIGIN="$BFF_ORIGIN" node build/index.js' >journey-evidence/service-logs/web.log 2>&1 &
          echo $! > journey-evidence/service-logs/web.pid

      - name: Wait for v4 service lifecycle
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..30}; do
            if kill -0 "$(cat journey-evidence/service-logs/bff.pid)" 2>/dev/null \
              && kill -0 "$(cat journey-evidence/service-logs/web.pid)" 2>/dev/null \
              && curl --fail --silent --show-error http://127.0.0.1:4322/healthz >/dev/null \
              && curl --fail --silent --show-error http://127.0.0.1:4321/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "v4 BFF and web preview did not become ready" >&2
          exit 1

      - name: Capture deterministic evidence
        run: bunx playwright test tests/e2e/journey-evidence-smoke.spec.ts --project=chromium --workers=1 --retries=0

      - name: Validate structured accessibility evidence
        run: node scripts/docs/validate-journey-accessibility-report.mjs journey-evidence/anonymous-home-smoke/accessibility-smoke.json

      - name: Reject textual secret patterns
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if grep -RIE --exclude='*.png' --exclude='*.zip' '(api[-_ ]?key|authorization|token|secret|cookie)[[:space:]]*[:=][[:space:]]*[^[:space:]]+|bearer[[:space:]]+[^[:space:]]+' journey-evidence; then
            echo "Potential secret material found in journey evidence" >&2
            exit 1
          fi

      - name: Stop v4 services
        if: always()
        shell: bash
        run: |
          for pid_file in journey-evidence/service-logs/web.pid journey-evidence/service-logs/bff.pid; do
            if test -f "$pid_file"; then
              kill -- "-$(cat "$pid_file")" 2>/dev/null || true
            fi
          done

      - name: Upload journey evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: anonymous-home-smoke-${{ github.sha }}
          path: |
            journey-evidence/anonymous-home-smoke/
            journey-evidence/service-logs/
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 14
          include-hidden-files: false
