name: Lock Hash Check

on:
  schedule:
    - cron: "0 4 * * 1"  # Every Monday at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lock-hash-check
  cancel-in-progress: false

jobs:
  lock-hash:
    name: Verify Lock File Determinism
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          cache: npm
      - name: Compute hash of package-lock.json
        run: |
          LOCK_HASH=$(sha256sum package-lock.json | cut -d' ' -f1)
          echo "lock_hash=${LOCK_HASH}" >> "$GITHUB_STEP_SUMMARY"
          echo "package-lock.json SHA256: ${LOCK_HASH}"
      - name: Verify deterministic install
        run: |
          BEFORE=$(sha256sum package-lock.json | cut -d' ' -f1)
          npm ci --dry-run 2>&1 | head -5 || true
          AFTER=$(sha256sum package-lock.json | cut -d' ' -f1)
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "::error::package-lock.json changed during npm ci --dry-run — lock file is not deterministic."
            exit 1
          fi
          echo "✅ package-lock.json is deterministic."
      - name: Reject vulnerable nested DOMPurify versions
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm ls dompurify --all --json > /tmp/omniroute-npm-ls.json 2>/dev/null || true
          node <<'NODE'
          const fs = require("node:fs");
          const tree = JSON.parse(fs.readFileSync("/tmp/omniroute-npm-ls.json", "utf8"));
          const vulnerable = [];
          const minimum = [3, 4, 12];
          const compare = (version) => {
            const parts = String(version).replace(/^[^0-9]*/, "").split(".").map(Number);
            for (let i = 0; i < minimum.length; i += 1) {
              if ((parts[i] || 0) !== minimum[i]) return (parts[i] || 0) - minimum[i];
            }
            return 0;
          };
          const visit = (node, path) => {
            if (!node || typeof node !== "object") return;
            if (node.name === "dompurify" && node.version && compare(node.version) < 0) {
              vulnerable.push(`${path}/dompurify@${node.version}`);
            }
            for (const [name, dependency] of Object.entries(node.dependencies || {})) {
              visit(dependency, `${path}/${name}`);
            }
          };
          visit(tree, "root");
          if (vulnerable.length) {
            console.error(`::error::Vulnerable DOMPurify versions found (<3.4.12): ${vulnerable.join(", ")}`);
            process.exit(1);
          }
          console.log("DOMPurify invariant passed: every installed version is >=3.4.12.");
          NODE
