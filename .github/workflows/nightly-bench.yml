# nightly-bench.yml — Polyglot binding tier performance regression gate
#
# Runs every night at 03:00 UTC.  Compares current bench results against the
# last-stable baseline (stored in bench-results/polyglot-tier-matrix-v2.json).
# Fails CI if any tier exceeds its tolerance window:
#   T1 (HTTP)   ±150%
#   T2 (UDS)    ±200%
#   T3 (FFI)    ±150%
#
# Ad-hoc trigger via GitHub Actions UI with `[bench]` in commit message.

name: nightly-bench

on:
  schedule:
    - cron: "0 3 * * *"
  push:
    paths:
      - "crates/omniroute-ffi/**"
      - "open-sse/rpc/**"
      - "benches/polyglot/**"
      - ".github/workflows/nightly-bench.yml"
  pull_request:
    paths:
      - "crates/omniroute-ffi/**"
      - "open-sse/rpc/**"
      - "benches/polyglot/**"
  workflow_dispatch:

concurrency:
  group: nightly-bench-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ── TS polyglot baselines ──────────────────────────────────────────────
  ts-baselines:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci --ignore-scripts --legacy-peer-deps --no-audit --no-fund
      - run: node --import tsx/esm benches/polyglot/run-all.ts
        env:
          OMNIROUTE_POLYGLOT_RECONCILER_ENABLED: "false"
      - run: node --import tsx/esm benches/polyglot/matrix-generator.ts
      - uses: actions/upload-artifact@v4
        with:
          name: bench-results-ts
          path: bench-results/

  # ── Rust FFI benches ───────────────────────────────────────────────────
  rust-ffi:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        crate:
          - omniroute_ffi_combo_scorer
          - omniroute_ffi_signature_cache
          - omniroute_ffi_sse_chunking
          - omniroute_ffi_guardrails_pii
          - omniroute_ffi_token_bucket
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true
      - run: cargo bench --manifest-path crates/omniroute-ffi/Cargo.toml -p ${{ matrix.crate }} -- --quick
        env:
          CARGO_TERM_COLOR: always
      - uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ matrix.os }}-${{ matrix.crate }}
          path: target/criterion/

  # ── Regression gate ────────────────────────────────────────────────────
  tier-verify:
    needs: [ts-baselines]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci --ignore-scripts --legacy-peer-deps --no-audit --no-fund
      - uses: actions/download-artifact@v4
        with:
          name: bench-results-ts
          path: bench-results/
      - run: node scripts/check/tier-matrix-verify.mjs --strict
      - name: Comment PR with regression report
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const report = fs.existsSync("bench-results/polyglot-tier-matrix.md")
              ? fs.readFileSync("bench-results/polyglot-tier-matrix.md", "utf-8")
              : "No regression report generated.";
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.payload.pull_request.number,
              body: `## ⚠ Polyglot Tier Regression Detected\n\n${report}\n\nSee [nightly-bench workflow](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for full output.`,
            });
            core.setFailed("Polyglot tier regression — check matrix for details.");
