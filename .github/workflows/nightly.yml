name: nightly

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC daily
  workflow_dispatch:

jobs:
  parity-bench:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - uses: dtolnay/rust-toolchain@5c142a9a4cb939ce7a7645f2e9651ab4428b7832
        with: { toolchain: stable }
      - run: pnpm install --frozen-lockfile
      - run: pnpm parity
      - run: pnpm codegen
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { repository: KooshaPari/OmniRoute, path: ../OmniRoute-pr232-policyfix-20260703, ref: main }
      - run: cargo bench --manifest-path ../OmniRoute-pr232-policyfix-20260703/backend-rust/Cargo.toml
