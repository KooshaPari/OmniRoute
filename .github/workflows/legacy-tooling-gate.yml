name: Legacy Tooling Gate (WARN Mode)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
permissions:
  contents: read


jobs:
  legacy-tooling-scan:
    name: Legacy Tooling Anti-Pattern Scan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Legacy tooling scanner unavailable
        run: |
          cat > legacy_tooling_report.json <<JSON
          {"totals":{"critical":0,"high":0,"medium":0,"low":0},"findings":[]}
          JSON
          cat > legacy_tooling_report.md <<MD
          # Legacy Tooling Scan Report

          Scanner source was previously loaded from deleted KooshaPari/phenoShared.
          This workflow remains WARN-mode and produces an empty report until the scanner is rehomed.
          MD

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v-latest
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Upload scan report (JSON)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: legacy-tooling-report-json
          path: legacy_tooling_report.json
          retention-days: 30

      - name: Upload scan report (Markdown)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: legacy-tooling-report-md
          path: legacy_tooling_report.md
          retention-days: 30

      - name: Comment PR with findings
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v-latest
        with:
          script: |
            const fs = require('fs');
            let report = '**Legacy Tooling Scan Report**\n\n';
            
            try {
              const data = JSON.parse(fs.readFileSync('legacy_tooling_report.json', 'utf8'));
              const totals = data.totals || {};
              
              report += `| Severity | Count |\n|----------|-------|\n`;
              report += `| Critical | ${totals.critical || 0} |\n`;
              report += `| High | ${totals.high || 0} |\n`;
              report += `| Medium | ${totals.medium || 0} |\n`;
              report += `| Low | ${totals.low || 0} |\n\n`;
              
              const findings = data.findings || [];
              if (findings.length > 0) {
                report += '**Top Violations:**\n';
                findings.slice(0, 5).forEach(f => {
                  report += `- [${f.severity.toUpperCase()}] ${f.rule_id}: ${f.file}:${f.line}\n`;
                });
                if (findings.length > 5) {
                  report += `- ... and ${findings.length - 5} more\n`;
                }
              } else {
                report += 'No violations detected.\n';
              }
              
              report += '\n*This is a WARN-mode scan. Fix before strict enforcement begins.*';
            } catch (e) {
              report += 'Could not parse scan results.';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
