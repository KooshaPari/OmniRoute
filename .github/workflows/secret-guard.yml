name: Secret Guard

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-guard:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
        with:
          fetch-depth: 0
      - name: Run secret guard
        shell: bash
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [[ -n "${PR_BASE_SHA:-}" ]]; then
            python scripts/secret-guard.py --since-ref "$PR_BASE_SHA"
          elif [[ -n "${PUSH_BEFORE_SHA:-}" && "${PUSH_BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            python scripts/secret-guard.py --since-ref "$PUSH_BEFORE_SHA"
          else
            python scripts/secret-guard.py
          fi
      - name: Run workflow action guard
        shell: bash
        run: python scripts/workflow-action-guard.py
