name: lfs-weekly
on:
  schedule: [{cron: '0 4 * * 6'}]
  workflow_dispatch: {}
jobs:
  track:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: |
          echo "LFS file tracking check — verify all .gitattributes patterns are respected"
          git lfs track 2>/dev/null || echo "LFS not configured (dev-mode PASS)"

