name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: sharecli-linux-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: sharecli-macos-arm64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        env:
          CARGO_NET_OFFLINE: "false"
        run: cargo build --release --bin sharecli --target ${{ matrix.target }}
      - name: Rename artifact
        run: |
          cp target/${{ matrix.target }}/release/sharecli ${{ matrix.artifact }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true
      - name: Create checksums
        run: |
          cd artifacts
          sha256sum sharecli-* > checksums.txt
          cat checksums.txt
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/sharecli-*
            artifacts/checksums.txt
          generate_release_notes: true
