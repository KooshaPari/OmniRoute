name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  desktop:
    name: Build desktop (Tauri 2)
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.11

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:packages

      - name: Build web
        run: pnpm build:web

      - name: Build Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "OmniRoute v4 ${{ github.ref_name }}"
          releaseBody: "OmniRoute v4 desktop release"
          releaseDraft: true
          prerelease: false

  web:
    name: Build + publish web
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:packages
      - run: pnpm build:web
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/build
