name: fuzz-ci
permissions:
  contents: read
on:
  schedule: [{cron: '0 2 * * 6'}]
  workflow_dispatch: {}
jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo install cargo-fuzz
      - run: cargo fuzz build --fuzz-dir fuzz
      - run: cargo fuzz list --fuzz-dir fuzz
