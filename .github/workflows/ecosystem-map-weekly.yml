# ecosystem-map-weekly.yml — weekly cron that auto-opens a remediation PR
# on ECOSYSTEM_MAP.md drift via peter-evans/create-pull-request@v6.
#
# Cadence: Monday 09:00 PDT (16:00 UTC) — per the 71-pillar refresh
# cadence (ADR-041 / audit-71-pillar-2026-06-17-wrapup.md § 11).
#
# Behaviour:
#   1. Checkout main, fetch the sibling curation-data repo.
#   2. Run the regen script in write mode to a staging path.
#   3. If the rendered file differs from the on-disk ECOSYSTEM_MAP.md,
#      peter-evans/create-pull-request@v6 opens a remediation PR
#      titled "chore(ecosystem-map): weekly regen <run-id>".
#   4. If they are equal, exit 0 silently (no PR).
#
# Permissions: contents: write + pull-requests: write (for the auto-PR).
name: ecosystem-map-weekly

on:
  schedule:
    # 16:00 UTC = 09:00 PDT (standard) / 08:00 PST. Monday.
    - cron: "0 16 * * 1"
  workflow_dispatch:
    inputs:
      force:
        description: "Force open a PR even if no drift detected"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  weekly-regen:
    name: weekly regen + auto-PR
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1

      - name: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: checkout sibling phenotype-registry-curation-data
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: KooshaPari/phenotype-registry-curation-data
          path: ../phenotype-registry-curation-data
          fetch-depth: 1
          persist-credentials: false

      - name: regen-ecosystem-map (write mode, to staging path)
        # Write to a staging path so we can compare with the on-disk file
        # before deciding whether to commit.
        run: |
          set -euo pipefail
          python3 scripts/regen-ecosystem-map.py --out /tmp/ECOSYSTEM_MAP.regen.md

      - name: detect drift
        id: drift
        run: |
          set -euo pipefail
          if ! diff -q ECOSYSTEM_MAP.md /tmp/ECOSYSTEM_MAP.regen.md >/dev/null 2>&1; then
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "DRIFT DETECTED — will open remediation PR." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "NO DRIFT — exiting silently." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: stage regenerated file at canonical path
        # Must run BEFORE peter-evans/create-pull-request@v6 - cpr commits
        # the workspace state at the add-paths locations.
        if: steps.drift.outputs.drift == 'true' || github.event.inputs.force == 'true'
        run: cp /tmp/ECOSYSTEM_MAP.regen.md ECOSYSTEM_MAP.md

      - name: open remediation PR on drift
        if: steps.drift.outputs.drift == 'true' || github.event.inputs.force == 'true'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          # cpr will commit the workspace state at this path. The
          # `stage regenerated file` step above copies the regen output
          # into place before this step runs.
          add-paths: ECOSYSTEM_MAP.md
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore(ecosystem-map): weekly regen ${{ github.run_id }}

            Auto-regenerated by .github/workflows/ecosystem-map-weekly.yml.
            The drift was detected against SPEC.md, docs/registries.md, and
            phenotype-registry-curation-data/_bindings.json.

            [skip ci]
          title: "chore(ecosystem-map): weekly regen ${{ github.run_id }}"
          body: |
            ## Auto-generated weekly regen

            `scripts/regen-ecosystem-map.py` was run on a Monday-morning cron and
            detected drift between the on-disk `ECOSYSTEM_MAP.md` and the
            canonical SSOT inputs (`SPEC.md`, `docs/registries.md`,
            `phenotype-registry-curation-data/_bindings.json`).

            ### What changed
            See the diff in this PR. The auto-regen script is deterministic; the
            only differences will be additions to:

            - §1 Canonical Registries (from `SPEC.md`)
            - §2 Bound Repo Set (from `_bindings.json`)
            - §4 Archive Migration Redirects (from `docs/registries.md`)
            - the `drift-detection` comment block at the bottom

            The hand-curated cluster appendix (§3) is preserved verbatim by the
            regen script.

            ### How to verify locally

            ```bash
            task regen-ecosystem-map:check     # should exit 0
            task regen-ecosystem-map:diff      # show the would-be diff
            ```

            ### How to fix a wrong diff

            If the diff is wrong, edit `SPEC.md` / `docs/registries.md` /
            `_bindings.json` (in the curation-data repo) so the regen output
            matches intent, then re-run this workflow via `workflow_dispatch`.

            ---

            _Auto-opened by `.github/workflows/ecosystem-map-weekly.yml`._
          branch: chore/ecosystem-map-weekly-${{ github.run_id }}
          delete-branch: true

      - name: summary
        if: always()
        run: |
          {
            echo "### ecosystem-map-weekly summary"
            echo "- commit:         ${{ github.sha }}"
            echo "- drift detected: ${{ steps.drift.outputs.drift }}"
            echo "- result:         ${{ job.status }}"
            echo ""
            echo "Cadence: every Monday 09:00 PDT (16:00 UTC). Source: ADR-041."
          } >> "$GITHUB_STEP_SUMMARY"
