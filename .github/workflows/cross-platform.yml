name: Cross-Platform Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Required for the `stable` release channel: stable is gated on the
  # `cross-platform` gate (config/release/ci-matrix.json), which can only
  # resolve to green if this workflow runs without manual intervention.
  # Weekly Saturday 02:00 UTC is far enough from the daily auto-release
  # (07:00 UTC) that green check-runs are visible to channel-resolver.mjs
  # before the next release attempt.
  schedule:
    - cron: "0 2 * * 6"
  workflow_dispatch:

concurrency:
  group: cross-platform-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JWT_SECRET: ci-cross-secret-with-sufficient-length-for-validation
  API_KEY_SECRET: ci-cross-api-key-secret
  DISABLE_SQLITE_AUTO_BACKUP: "true"

jobs:
  build-cli:
    name: CLI Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["24"]
    runs-on: ${{ matrix.os }}
    # A cold macOS Next.js build has reached ~19m20s; leave deterministic
    # headroom without weakening or skipping the cross-platform build gate.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Check Node runtime
        run: npm run check:node-runtime
      - name: Clear transient Next build cache
        run: >-
          node -e "require('node:fs').rmSync('.build/next/cache', { recursive: true, force: true })"
      - name: Isolate Windows home from protected junctions
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/home"
          echo "USERPROFILE=$RUNNER_TEMP/home" >> "$GITHUB_ENV"
      - name: Build CLI
        run: npm run build:cli
        env:
          # Windows runners can restore a partially-written webpack pack while
          # Next is tracing protected Application Data junctions. Disable the
          # filesystem cache for a deterministic clean production build.
          NEXT_DISABLE_WEBPACK_CACHE: "1"
          NEXT_TELEMETRY_DISABLED: "1"
      - name: Assert server.js exists
        run: test -f dist/server.js || (echo "dist/server.js missing" && exit 1)
        shell: bash

  test-unit:
    name: Unit Tests (${{ matrix.os }})
    needs: build-cli
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ["24"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Run unit tests
        run: node --import tsx --import ./tests/_setup/isolateDataDir.ts --test --test-force-exit --test-concurrency=4 tests/unit/*.test.ts
        env:
          JWT_SECRET: ci-cross-test-secret
          API_KEY_SECRET: ci-cross-test-api-key

  rust-ffi-crates:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@stable
      - name: Build FFI crates
        run: cargo build --release --manifest-path crates/omniroute-ffi/Cargo.toml
      - name: Test FFI crates
        run: cargo test --manifest-path crates/omniroute-ffi/Cargo.toml
