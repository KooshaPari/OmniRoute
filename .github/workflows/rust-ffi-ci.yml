name: rust-ffi-ci

on:
  push:
    paths:
      - "crates/omniroute-ffi/**"
      - ".github/workflows/rust-ffi-ci.yml"
  pull_request:
    paths:
      - "crates/omniroute-ffi/**"
      - ".github/workflows/rust-ffi-ci.yml"

jobs:
  tier-matrix-verify:
    name: Tier matrix CI gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-rust@v1
        with:
          toolchain: stable
          cache-on-failure: true
      - name: Build cdylibs
        run: cargo build --release --manifest-path crates/omniroute-ffi/Cargo.toml
      - name: Test
        run: cargo test --manifest-path crates/omniroute-ffi/Cargo.toml
      - name: Bench (quick)
        run: |
          cargo bench --manifest-path crates/omniroute-ffi/Cargo.toml -- --quick || true
      - name: Verify tier matrix
        run: |
          node scripts/check/tier-matrix-verify.mjs --strict
        continue-on-error: false

  cargo-build-matrix:
    name: cargo build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-apple-darwin
          - x86_64-pc-windows-gnu
        exclude:
          - os: macos-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-rust@v1
        with:
          toolchain: stable
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: cargo build
        run: cargo build --release --manifest-path crates/omniroute-ffi/Cargo.toml --target ${{ matrix.target }}
      - name: cargo test
        run: cargo test --manifest-path crates/omniroute-ffi/Cargo.toml --target ${{ matrix.target }}
      - name: Upload cdylib
        uses: actions/upload-artifact@v4
        with:
          name: libomniroute-ffi-${{ matrix.target }}
          path: |
            crates/omniroute-ffi/target/${{ matrix.target }}/release/libomniroute_ffi_*.{so,dylib,dll}
          if-no-files-found: warn
