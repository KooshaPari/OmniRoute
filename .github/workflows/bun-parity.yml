name: Bun runtime and types parity

on:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "**/package.json"
      - "**/bun.lock"
      - "scripts/check/check-v4-bun-version.mjs"
      - "tests/unit/bun-version-parity.test.mjs"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bun-parity-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frozen-install:
    name: Frozen install (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f54443c22b8 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Frozen root npm install
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Frozen Bun installs
        shell: bash
        run: |
          for directory in packages/api-contracts packages/design-tokens apps/bff apps/web apps/desktop sveltekit-dashboard desktop-electrobun; do
            bun install --frozen-lockfile --ignore-scripts --cwd "$directory"
          done
      - name: Verify runtime and repository contract
        shell: bash
        run: |
          test "$(bun --version)" = "1.3.14"
          test "$(./node_modules/.bin/bun --version)" = "1.3.14"
          node scripts/check/check-v4-bun-version.mjs
          git diff --exit-code -- package-lock.json '**/bun.lock'
      - name: Record exact-head evidence
        shell: bash
        run: |
          mkdir -p bun-parity-evidence
          node -e 'const fs=require("fs"); fs.writeFileSync("bun-parity-evidence/report.json", JSON.stringify({sha:process.env.GITHUB_SHA,os:process.platform,arch:process.arch,bun:process.argv[1]},null,2)+"\n")' "$(bun --version)"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bun-parity-${{ matrix.os }}-${{ github.sha }}
          path: bun-parity-evidence/report.json
          retention-days: 14

  compatibility:
    name: TS5, TS7, tests, and builds
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f54443c22b8 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Install v4 packages
        run: |
          for directory in packages/api-contracts packages/design-tokens apps/bff apps/web apps/desktop; do
            bun install --frozen-lockfile --ignore-scripts --cwd "$directory"
          done
      - run: node --test tests/unit/bun-version-parity.test.mjs
      - run: bun run ci:v4:typecheck
      - run: bun run ci:v4:typecheck:ts7
      - run: bun test --cwd packages/api-contracts
      - run: bun run --cwd apps/bff test
      - run: bun run --cwd apps/web test
      - run: bun run --cwd apps/web build
      - run: bun run --cwd apps/bff build
