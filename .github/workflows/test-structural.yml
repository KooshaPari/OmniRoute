name: Test Structural
on:
  push:
    branches: [nonexistent]
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      max-channel:
        description: test
        required: false
        type: choice
        default: "stable"
        options: [nightly, canary, alpha, beta, rc, stable]
      force:
        description: test
        required: false
        type: boolean
        default: false
      sha:
        description: test
        required: false
        type: string
permissions:
  contents: write
  id-token: write
  packages: write
  pull-requests: read
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - run: echo "structural test ok"
