name: parallel-merge-execution
on:
  workflow_dispatch:
    inputs:
      branches:
        description: 'Branches to merge (comma-separated)'
        required: true
      action:
        description: 'Action to perform'
        required: true
        default: 'validate'
        type: choice
        options:
          - validate
          - merge
          - cleanup

jobs:
  parallel-merge:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: ${{ fromJson(inputs.branches) }}
      max-parallel: 6
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run parallel merge
        run: |
          if [[ "${{ inputs.action }}" == "validate" ]]; then
            npm run merge:parallel
          elif [[ "${{ inputs.action }}" == "merge" ]]; then
            npm run merge:finish
          else
            npm run cleanup:branches:execute
          fi

  cleanup:
    runs-on: ubuntu-latest
    needs: parallel-merge
    if: always()
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Cleanup stale branches
        run: npm run cleanup:branches:execute
