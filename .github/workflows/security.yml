name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 09:00 PDT cron (ADR-042 cadence)
    - cron: '0 16 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  security-events: write
  id-token: write   # required for SLSA provenance

jobs:
  codeql:
    name: CodeQL (javascript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-extended
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: npm audit
        run: npm audit --audit-level=high

  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  sbom:
    name: SBOM generation (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          artifact-name: ${{{{ github.repository }}}}.sbom.json
        continue-on-error: true

  slsa-provenance:
    name: SLSA Build Level 3 provenance
    runs-on: ubuntu-latest
    needs: [codeql, dependency-audit, gitleaks]
    steps:
      - uses: actions/checkout@v4
      - name: Generate SLSA provenance attestation
        uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v1.9.0
        with:
          base64-subjects: "${{ needs.dependency-audit.outputs.digest || needs.gitleaks.outputs.digest || '' }}"
        continue-on-error: true
