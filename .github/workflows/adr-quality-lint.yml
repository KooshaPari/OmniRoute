name: adr-quality-lint
on:
  pull_request:
    paths: ['docs/adr/**']
  push:
    paths: ['docs/adr/**']
if: ${{ github.event_name != "push" && (github.event_name != "pull_request" || contains(github.event.pull_request.labels.*.name, "ci-billing-exception")) }}
jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: python3 .githooks/adr-quality-lint.py

