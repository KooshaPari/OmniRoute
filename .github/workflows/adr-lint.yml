name: ADR Lint
on:
  push:
    branches: [main]
    paths:
      - 'docs/adr/**'
      - 'scripts/adr_backlink_check.py'
      - 'scripts/adr_backlink_baseline.txt'
      - 'scripts/adr_index_gen.py'
      - '.github/workflows/adr-lint.yml'
  pull_request:
    paths:
      - 'docs/adr/**'
      - 'scripts/adr_backlink_check.py'
      - 'scripts/adr_backlink_baseline.txt'
      - 'scripts/adr_index_gen.py'
      - '.github/workflows/adr-lint.yml'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  adr-lint:
    name: ADR lint (index + backlinks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Regenerate docs/adr/INDEX.md
        run: python3 scripts/adr_index_gen.py

      - name: Verify INDEX.md is up to date
        # `adr_index_gen.py --check` exits 1 if the on-disk INDEX.md would
        # change on regeneration. This catches "added an ADR but forgot to
        # regenerate the index" mistakes.
        run: python3 scripts/adr_index_gen.py --check --quiet

      - name: Verify ADR cross-references resolve
        # `adr_backlink_check.py` exits 1 if any ADR file cites a non-existent
        # ADR (broken cross-ref). `--quiet` keeps the log clean.
        run: python3 scripts/adr_backlink_check.py --quiet

      - name: Show backlink summary (verbose)
        # Verbose output goes to the workflow log only; does not gate the
        # build. Useful for debugging "why did the gate fail" without
        # running locally.
        if: always()
        run: python3 scripts/adr_backlink_check.py --quiet || true
