name: Local-First CI Attestation

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: local-first-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  mode:
    name: Select attestation mode
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      selected: ${{ steps.mode.outputs.mode }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v4.4.0
        with:
          node-version: "24"
      - id: mode
        name: Resolve event mode
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: node scripts/check/local-first-ci-mode.mjs

  verify-committed-evidence:
    name: Verify committed schema-v2 evidence
    needs: mode
    if: ${{ needs.mode.outputs.selected == 'verify' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v4.4.0
        with:
          node-version: "24"
      - name: Verify exact-tree attestation manifest
        run: node scripts/check/local-first-ci-attestation.mjs

  live-gates:
    name: Run canonical gates live
    needs: mode
    if: ${{ needs.mode.outputs.selected == 'live' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v4.4.0
        with:
          node-version: "24"
          cache: npm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Install pinned dependencies
        run: npm ci --ignore-scripts
      - name: Typecheck core
        run: bunx --no-install tsc --noEmit --noCheck --ignoreDeprecations 6.0 -p open-sse/tsconfig.json
      - name: Verify and write integrity manifest
        run: bun run integrity:manifest:write
      - name: Enforce T11 any budget
        run: bun scripts/check/check-t11-any-budget.mjs
      - name: Detect dependency cycles
        run: bun scripts/check/check-cycles.mjs
      - name: Run mode, unit, and tamper tests
        run: node --test scripts/check/local-first-ci-mode.test.mjs scripts/check/local-first-ci-attestation.test.mjs
      - name: Assert live mode did not mutate committed evidence
        run: git diff --exit-code -- .ci/local-first-ci-manifest.json .ci/local-first-ci-gates

  terminal:
    name: Local-First CI terminal
    if: ${{ always() }}
    needs: [mode, verify-committed-evidence, live-gates]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      MODE_RESULT: ${{ needs.mode.result }}
      SELECTED_MODE: ${{ needs.mode.outputs.selected }}
      VERIFY_RESULT: ${{ needs.verify-committed-evidence.result }}
      LIVE_RESULT: ${{ needs.live-gates.result }}
    steps:
      - name: Enforce selected mode result
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$MODE_RESULT" != "success" ]]; then
            echo "Mode selection was not successful: $MODE_RESULT" >&2
            exit 1
          fi
          case "$SELECTED_MODE" in
            verify)
              [[ "$VERIFY_RESULT" == "success" && "$LIVE_RESULT" == "skipped" ]] || {
                echo "Unexpected verify-mode results: verify=$VERIFY_RESULT live=$LIVE_RESULT" >&2
                exit 1
              }
              ;;
            live)
              [[ "$LIVE_RESULT" == "success" && "$VERIFY_RESULT" == "skipped" ]] || {
                echo "Unexpected live-mode results: live=$LIVE_RESULT verify=$VERIFY_RESULT" >&2
                exit 1
              }
              ;;
            *)
              echo "Unexpected Local-First mode: $SELECTED_MODE" >&2
              exit 1
              ;;
          esac
