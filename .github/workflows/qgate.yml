# qgate quality gate for OmniRoute.
#
# Runs the local coverage producer on a Linux standard runner. Non-blocking
# until coverage reaches the .qgate.toml threshold (per the "1 via 2" protocol).
#
# Spectrum categories exercised (when PR #198 lands on phenotype-tooling):
#   - coverage: npm test:coverage emits lcov report
#   - a11y:     playwright tests with axe accessibility
#   - e2e:      playwright browser tests
#   - dast:     schemathesis against published OpenAPI spec
#   - sast:     semgrep config=auto (TS/JS ruleset)
#   - sbom:     CycloneDX npm/node dependencies

name: qgate

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  qgate:
    continue-on-error: true   # remove once coverage ≥60%

    runs-on: ubuntu-latest # GitHub-hosted; usage may be billed

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4.0.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Generate coverage report (lcov) from existing test suite.
      - name: Generate coverage (lcov)
        continue-on-error: true
        run: npm run test:coverage
        env:
          NODE_ENV: test

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 14

