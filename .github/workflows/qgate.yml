# qgate quality gate for OmniRoute.
#
# Generates coverage and runs qgate in one Linux job so the gate consumes the
# exact report produced by this checkout. qgate is built from the immutable
# phenotype-tooling revision pinned below. Non-blocking until coverage reaches
# the .qgate.toml threshold (per the "1 via 2" protocol).
#
# Spectrum categories exercised:
#   - coverage: npm test:coverage emits lcov report
#   - a11y:     playwright tests with axe accessibility
#   - e2e:      playwright browser tests
#   - dast:     schemathesis against published OpenAPI spec
#   - sast:     semgrep config=auto (TS/JS ruleset)
#   - sbom:     CycloneDX npm/node dependencies

name: qgate

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  # PRs share a stable numeric key across synchronize events; branch runs fall
  # back to their full ref so main and future stable/release refs stay isolated.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  qgate:
    continue-on-error: true   # remove once coverage ≥60%
    timeout-minutes: 45       # bound npm/coverage/Rust stalls; preserve a terminal gate result

    runs-on: ubuntu-latest   # Linux standard only — no billed runners

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4.0.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # qgate invokes stack-native tools directly. npm does not add the local
      # binary directory to PATH outside lifecycle scripts, so expose the
      # immutable lockfile-installed bun/playwright/tsc/eslint executables.
      - name: Expose project-local tools
        run: echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      # Generate coverage report (lcov) from existing test suite.
      - name: Generate coverage (lcov)
        id: coverage
        continue-on-error: true
        run: npm run test:coverage
        env:
          NODE_ENV: test

      # The coverage command can return non-zero for test failures after c8 has
      # already emitted a complete report. qgate should still analyze that
      # report, but a missing/empty report is a real pipeline failure.
      - name: Require generated coverage
        if: always()
        env:
          COVERAGE_OUTCOME: ${{ steps.coverage.outcome }}
        run: |
          if ! test -s coverage/lcov.info; then
            echo "::error::coverage/lcov.info was not generated or is empty"
            exit 1
          fi
          if [ "$COVERAGE_OUTCOME" != "success" ]; then
            echo "::warning::coverage tests failed; qgate will analyze the generated lcov report"
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 14

      # A reusable workflow can only be called at job level and would run in a
      # separate workspace, where the coverage generated above does not exist.
      # Build the pinned qgate source and consume the report in this job.
      - name: Checkout qgate source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: KooshaPari/phenotype-tooling
          ref: c43cc4af2cbcc2bb2df37f3e4ab78cc5d8c1b3ad
          path: _phenotype-tooling
          persist-credentials: false

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable

      - name: Build qgate
        working-directory: _phenotype-tooling
        run: cargo build --release -p qgate

      - name: Run qgate quality gate
        run: |
          set -o pipefail
          _phenotype-tooling/target/release/qgate run \
            --coverage-report coverage/lcov.info \
            --coverage-format lcov \
            --threshold 60 \
            --path . \
            | tee qgate-report.json

      - name: Upload qgate report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: qgate-report
          path: qgate-report.json
          if-no-files-found: warn
          retention-days: 30
