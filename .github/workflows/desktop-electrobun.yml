name: Electrobun Desktop Quality

on:
  pull_request:
    paths:
      - "desktop-electrobun/**"
      - "apps/web/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/desktop-electrobun.yml"
  push:
    branches: [main]
    paths:
      - "desktop-electrobun/**"
      - "apps/web/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/desktop-electrobun.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: electrobun-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.14"

jobs:
  quality:
    name: Electrobun typecheck and bundle
    runs-on: macos-14
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install desktop dependencies
        working-directory: desktop-electrobun
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Typecheck desktop shell
        working-directory: desktop-electrobun
        run: bun run typecheck
      - name: Build desktop shell
        working-directory: desktop-electrobun
        run: bun run build
