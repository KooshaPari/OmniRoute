name: Electrobun desktop check

on:
  pull_request:
    paths:
      - "desktop-electrobun/**"
      - "apps/web/**"
      - "scripts/build/prepare-electrobun-web.mjs"
      - ".github/workflows/desktop-electrobun.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14
      - name: Install web dependencies
        working-directory: apps/web
        run: bun install --frozen-lockfile
      - name: Build web client handoff
        working-directory: apps/web
        run: bun run build
      - name: Install desktop dependencies
        working-directory: desktop-electrobun
        run: bun install --ignore-scripts
      - name: Stage deterministic renderer assets
        working-directory: desktop-electrobun
        run: bun run prepare:web
      - name: Typecheck desktop shell
        working-directory: desktop-electrobun
        run: bun run typecheck
      - name: Verify renderer contract
        working-directory: desktop-electrobun
        run: test -f generated/web/index.html && test -f generated/web/_app/version.json
      - name: Build Electrobun shell
        working-directory: desktop-electrobun
        run: ./node_modules/.bin/electrobun build
      - name: Upload Electrobun build output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: omniroute-electrobun-build-${{ github.sha }}
          path: desktop-electrobun/build/
          if-no-files-found: error
          retention-days: 7
