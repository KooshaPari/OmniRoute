# lts-backport reusable workflow
#
# CI for long-term-support (LTS) release branches (e.g. release/3.8-lts).
#
# Why a reusable workflow:
#   - Every LTS branch (cut by release-channels.yml#lts-cut) needs identical CI.
#     Inline-duplicating the CI in each branch's auto-generated workflow file is
#     brittle and drifts across cuts. A reusable workflow here gives one source
#     of truth for LTS-branch CI behavior.
#   - LTS branches get a deliberately narrower gate set than trunk:
#       * heavy nightly suites (chaos, fuzz, mutation, schemathesis, property,
#         llm-security, resilience) are SKIPPED — backports don't introduce
#         new attack surface, only ship critical fixes.
#       * the core fast-gates (typecheck, lint, unit, vitest, integration) run
#         via the existing reusable/quality-gate.yml.
#       * a release-green pre-flight runs to ensure the LTS branch isn't
#         silently red (the same failure mode this script was originally
#         written to detect on the release PR).
#       * a build-smoke job verifies the CLI artifact still produces dist/.
#
# Inputs:
#   node-version-file    .nvmrc path (default: .nvmrc)
#   release-green-mode   'full' (default) | 'quick' (skip slow unit+vitest+integration)
#   skip-quality-gate    skip the full qgate spectrum (default: false)
#
# Outputs:
#   release-green-status   'pass' | 'fail'
#   build-smoke-status     'pass' | 'fail'
#
# Invoked by:
#   - .github/workflows/release-channels.yml (lts-cut generates the per-branch
#     .github/workflows/lts-backport-ci.yml that calls THIS workflow).

name: lts-backport (reusable)

on:
  workflow_call:
    inputs:
      node-version-file:
        description: 'Path to the .nvmrc file'
        required: false
        default: '.nvmrc'
        type: string
      release-green-mode:
        description: "release-green mode: 'full' or 'quick'"
        required: false
        default: 'full'
        type: string
      skip-quality-gate:
        description: 'Skip the full quality-gate spectrum (LTS smoke-only mode)'
        required: false
        default: 'false'
        type: string
    outputs:
      release-green-status:
        description: "'pass' or 'fail' from the release-green pre-flight"
        value: ${{ jobs.release-green.outputs.status }}
      build-smoke-status:
        description: "'pass' or 'fail' from the build smoke job"
        value: ${{ jobs.build-smoke.outputs.status }}

permissions:
  contents: read

concurrency:
  group: lts-backport-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Core matrix: run the existing reusable quality gate (qgate spectrum) ──
  # Mirrors what runs on PRs to main, but on the LTS branch's working tree.
  quality-gate:
    if: ${{ inputs.skip-quality-gate != 'true' }}
    name: LTS Quality Gate
    uses: ./.github/workflows/reusable/quality-gate.yml
    with:
      coverage-report: coverage/lcov.info
      coverage-format: lcov
      threshold: 60
      not-applicable: 'mutation,dast'
      sast-config: auto

  # ── release-green pre-flight: full ci.yml equivalent against LTS tree ─────
  # Catches the failure mode this entire branch system was built to prevent:
  # silently-red release branches due to fast-gates-only PR validation.
  release-green:
    name: LTS release-green pre-flight
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      status: ${{ steps.green.outputs.status }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38  # v6
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run release-green validator
        id: green
        env:
          GREEN_MODE: ${{ inputs.release-green-mode }}
        run: |
          set -euo pipefail
          case "$GREEN_MODE" in
            quick) FLAGS="--quick" ;;
            full)  FLAGS="" ;;
            *)     echo "::error::invalid release-green-mode: $GREEN_MODE (expected 'full' or 'quick')"; exit 2 ;;
          esac
          if npm run check:release-green -- $FLAGS; then
            echo "status=pass" >> "$GITHUB_OUTPUT"
          else
            echo "status=fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi

  # ── Build smoke: verify CLI artifact still produces on the LTS branch ────
  build-smoke:
    name: LTS build smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      status: ${{ steps.build.outputs.status }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38  # v6
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build CLI
        id: build
        run: |
          set -euo pipefail
          npm run build:cli
          if [ ! -f dist/server.js ]; then
            echo "::error::dist/server.js missing on LTS branch"
            exit 1
          fi
          echo "dist_size=$(stat -c '%s' dist/server.js 2>/dev/null || stat -f '%z' dist/server.js)" >> "$GITHUB_OUTPUT"
          echo "status=pass" >> "$GITHUB_OUTPUT"

      - name: Assert CLI version parity with branch name
        if: ${{ always() }}
        env:
          VERSION: ${{ steps.build.outputs.dist_size }}
        run: |
          set -euo pipefail
          PKG_VERSION=$(node -p "require('./package.json').version")
          BRANCH=$(echo "$GITHUB_REF_NAME" | sed -E 's#^release/(.+)-lts$#\1#')
          # PKG_VERSION on an LTS branch is always `${MAJOR}.${MINOR}.${PATCH}` of the
          # cut stable release. Compare major.minor.
          PKG_MM=$(echo "$PKG_VERSION" | awk -F. '{print $1"."$2}')
          BRANCH_MM=$(echo "$BRANCH" | awk -F. '{print $1"."$2}')
          if [ "$PKG_MM" != "$BRANCH_MM" ]; then
            echo "::error::LTS branch ($BRANCH_MM) and package.json version ($PKG_MM) disagree on major.minor"
            exit 1
          fi
          echo "✅ LTS branch $BRANCH_MM matches package.json $PKG_VERSION"

  # ── Summary ────────────────────────────────────────────────────────────────
  summary:
    name: LTS summary
    runs-on: ubuntu-latest
    needs: [quality-gate, release-green, build-smoke]
    if: ${{ always() }}
    steps:
      - name: Emit LTS gate summary
        run: |
          {
            echo "## LTS Branch Gate Summary"
            echo ""
            echo "| Gate | Status | Notes |"
            echo "|------|--------|-------|"
            if [ "${{ inputs.skip-quality-gate }}" = "true" ]; then
              echo "| Quality gate | ⊘ skipped | skip-quality-gate=true |"
            else
              echo "| Quality gate | ${{ needs.quality-gate.result }} | qgate spectrum (mutation/dast N/A) |"
            fi
            echo "| Release-green | ${{ needs.release-green.outputs.status }} | mode=${{ inputs.release-green-mode }} |"
            echo "| Build smoke | ${{ needs.build-smoke.outputs.status }} | CLI artifact + version parity |"
          } >> "$GITHUB_STEP_SUMMARY"
