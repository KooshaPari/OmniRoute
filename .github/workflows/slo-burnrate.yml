name: slo-burnrate
permissions:
  contents: read
on:
  schedule: [{cron: '0 */6 * * *'}]
  workflow_dispatch: {}
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Checking SLO burn-rate thresholds..."
      - name: Alert if config drift
        run: |
          test -f findings/v30-l63-slo-latency.md || { echo "Missing SLO spec"; exit 1; }
          echo "SLO spec present — OK"
