# Security Scans for OmniRoute
version: 2
jobs:
  security-scans:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v3
      - name: "Install Trufflehog"
        run: |-
          sudo apt-get update && \
          sudo apt-get install -y cargo wget && \
          wget https://github.com/trufflehog/trufflehog/releases/latest/download/trufflehog-linux-amd64.tar.gz && \
          tar -xzf trufflehog-linux-amd64.tar.gz && \
          mv trufflehog /usr/local/bin/trufflehog
      - name: "Run Trufflehog"
        run: trufflehog scan
      - name: "Install Semgrep"
        run: pip install semgrep
      - name: "Run Semgrep"
        run: semgrep scan
      - name: "Run cargo audit if Rust present"
        run: |
          if [ -f Cargo.toml ]; then
            cargo audit
          else
            echo "No Cargo.toml found, skipping cargo audit."
          fi