name: Apps Quality (Svelte + Hono)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.14"

jobs:
  apps-quality:
    name: SvelteKit + Hono/Bun quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - name: Install pinned Bun runtime
        run: npm install --global "bun@${BUN_VERSION}" --ignore-scripts --no-audit --no-fund
      - name: Install BFF dependencies from lockfile
        working-directory: apps/bff
        run: bun install --frozen-lockfile --ignore-scripts
      - name: BFF typecheck
        working-directory: apps/bff
        run: bun run typecheck
      - name: BFF tests
        working-directory: apps/bff
        run: bun run test
      - name: BFF production build
        working-directory: apps/bff
        run: bun run build
      - name: Install web dependencies from lockfile
        working-directory: apps/web
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Web typecheck
        working-directory: apps/web
        run: bun run typecheck
      - name: Web tests
        working-directory: apps/web
        run: bun run test
      - name: Web production build
        working-directory: apps/web
        run: bun run build
