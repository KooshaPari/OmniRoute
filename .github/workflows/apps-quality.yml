name: Apps Quality (Svelte + Hono)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.14"

jobs:
  apps-quality:
    name: SvelteKit + Hono/Bun quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: "24"
          cache: npm
      - name: Install pinned Bun runtime
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install API contract dependencies from lockfile
        working-directory: packages/api-contracts
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Install BFF dependencies from lockfile
        working-directory: apps/bff
        run: bun install --frozen-lockfile --ignore-scripts
      - name: BFF typecheck
        working-directory: apps/bff
        run: bun run typecheck
      - name: BFF tests
        working-directory: apps/bff
        run: bun run test
      - name: BFF production build
        working-directory: apps/bff
        run: bun run build
      - name: Install web dependencies from lockfile
        working-directory: apps/web
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Web typecheck
        working-directory: apps/web
        run: bun run typecheck
      - name: Web tests
        working-directory: apps/web
        run: bun run test
      - name: Web production build
        working-directory: apps/web
        run: bun run build
