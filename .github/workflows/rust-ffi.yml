# Rust FFI crate CI (ADR-032 / F2–F5)
#
# Builds and tests the polyglot binding FFI crates under
# `crates/omniroute-ffi/`. Runs on every push/PR that touches any file
# under `crates/omniroute-ffi/` or triggers a manual dispatch.
#
# The produced cdylibs are NOT published as artifacts here — they are
# built during the `npm run ffi:build` step of the main CI pipeline when
# the operator opts in via `OMNIROUTE_FFI_BUILD_ENABLED=1`. This workflow
# only validates correctness + catches regressions in the Rust code.
#
# Builds on: ubuntu (default), macOS, and Windows to prevent platform-
# specific SIMD or ABI issues from reaching production.
#
# See also:
#   - ADR-032 § "T3 Native ABI FFI"
#   - crates/omniroute-ffi/VENDOR.md

name: Rust FFI

on:
  push:
    branches: [main]
    paths:
      - "crates/omniroute-ffi/**"
      - ".github/workflows/rust-ffi.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/omniroute-ffi/**"
      - ".github/workflows/rust-ffi.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    name: Lint (clippy + fmt)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo clippy --manifest-path crates/omniroute-ffi/Cargo.toml --all-targets -- -D warnings
      - run: cargo fmt --manifest-path crates/omniroute-ffi/Cargo.toml --all --check

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --manifest-path crates/omniroute-ffi/Cargo.toml --release --all-targets
      - name: Run tests
        run: cargo test --manifest-path crates/omniroute-ffi/Cargo.toml --release
      - name: Verify cdylib artifacts exist
        shell: bash
        run: |
          set -e
          # Check that each sub-crate produced a shared library artifact.
          # The exact filename varies per platform (.so / .dylib / .dll).
          case "${{ matrix.os }}" in
            ubuntu*) EXT="so" ;;
            macos*)  EXT="dylib" ;;
            windows*) EXT="dll" ;;
          esac
          ROOT="target/release"
          for CRATE in omniroute_ffi_combo_scorer omniroute_ffi_signature_cache omniroute_ffi_sse_chunking; do
            FILE=$(find "$ROOT" -maxdepth 1 \( -name "lib${CRATE}.${EXT}" -o -name "${CRATE}.${EXT}" \) -print -quit)
            if [ -z "$FILE" ]; then
              echo "::error::Missing cdylib for ${CRATE} (expected lib${CRATE}.${EXT} or ${CRATE}.${EXT})"
              ls -la "$ROOT" | head -20
              exit 1
            fi
            echo "✅ ${FILE} ($(du -h "$FILE" | cut -f1))"
          done

  # Nightly bench run — purely informational, never gates CI.
  bench:
    name: Benchmark (informational)
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: dtolnay/rust-toolchain@stable
      - name: Build benches
        run: cargo bench --manifest-path crates/omniroute-ffi/Cargo.toml --no-run
      - name: Run bench (10 iterations)
        run: cargo bench --manifest-path crates/omniroute-ffi/Cargo.toml -- --warm-up-time 1 --measurement-time 2 -n 10
