name: omniroute-rs

on:
  pull_request:
    paths:
      - "crates/omniroute-rs/**"
      - ".github/workflows/omniroute-rs.yml"
  push:
    branches: [main]
    paths:
      - "crates/omniroute-rs/**"
      - ".github/workflows/omniroute-rs.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: omniroute-rs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: cargo check (Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/omniroute-rs
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85.0
      - run: cargo check --workspace --locked
