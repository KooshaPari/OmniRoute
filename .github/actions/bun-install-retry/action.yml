name: Bun install with retry
description: Install pinned Bun dependencies with frozen-lockfile retries.
runs:
  using: composite
  steps:
    - name: Set up Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version-file: package.json
    - shell: bash
      run: |
        set -euo pipefail

        max_attempts=3
        delay_seconds=20

        for attempt in $(seq 1 "$max_attempts"); do
          if [ "$attempt" -gt 1 ]; then
            echo "bun install attempt $attempt/$max_attempts after transient failure"
          fi

          if bun install --frozen-lockfile; then
            exit 0
          fi

          exit_code=$?
          if [ "$attempt" -eq "$max_attempts" ]; then
            exit "$exit_code"
          fi

          sleep "$delay_seconds"
          delay_seconds=$((delay_seconds * 2))
        done
