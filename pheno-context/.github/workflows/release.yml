name: Release
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (semver)'
        required: true
        default: '0.1.0'

# Release runs are sequential; never cancel a release mid-flight.
# pheno-context has `publish = false` in Cargo.toml — this workflow
# builds, tests, generates an SBOM, and creates a GitHub Release,
# but does NOT publish to crates.io (per ADR-023 substrate-quality-bar
# internal substrate consumed via path dep).
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches Cargo.toml
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag v$VERSION != Cargo.toml $CARGO_VERSION"
            exit 1
          fi

      - name: Build + test (release)
        run: |
          cargo test --release --locked --all-features
          # cargo publish --dry-run is a no-op for publish=false crates
          # but cargo refuses it; instead we run `cargo package --no-verify`
          # to ensure the crate would package cleanly if publish were true.
          cargo package --locked --no-verify --allow-dirty

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-cyclonedx

      - name: Generate SBOM (CycloneDX)
        run: cargo cyclonedx --all-features --format json --override-filename target/sbom

      - name: Create GitHub Release + attach SBOM
        uses: softprops/action-gh-release@v2
        with:
          name: "pheno-context ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            target/sbom.json
            target/sbom.cdx.xml
