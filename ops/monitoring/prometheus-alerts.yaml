# F — Alerting rules for dispatch binding tiers.
# Deploy to: /etc/prometheus/rules/dispatch-alerts.yml

groups:
  - name: dispatch_tier_alerts
    interval: 30s
    rules:
      # P0: All edges fell back to T1 (HTTP) — kills performance wins
      - alert: DispatchAllEdgesOnT1
        expr: |
          count(dispatch_current_tier{} == 1) > 15
        for: 2m
        labels:
          severity: critical
          pagerduty: omniroute-dispatch
        annotations:
          summary: "All {{ $value }} dispatch edges back to T1 (HTTP)"
          runbook: "docs/adr/0032-dispatch-binding-tiers.md#appendix-f---production-runbook"

      # P1: Tier cascade (10+ changes in 5m) — likely a kill-switch event
      - alert: DispatchCascadeDetected
        expr: |
          dispatch:tier_changes:rate5m > 10
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High rate of dispatch tier changes"
          description: "{{ $value }} changes/5m — possible kill-switch cascade"

      # P2: Reconciler sweep taking too long
      - alert: DispatchSweepSlow
        expr: |
          dispatch:sweep_duration:quantile_over_1h > 5.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Dispatch reconciler sweep p95 > 5s"

      # P3: Tier adoption below 0.8 (should be >0.9 post-rollout)
      - alert: DispatchLowAdoption
        expr: |
          dispatch:tier_adoption_ratio < 0.8
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "Dispatch adoption ratio {{ $value | humanize }} — below 0.8 target"