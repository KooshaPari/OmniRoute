apiVersion: v1
kind: Service
metadata:
  name: omniroute-routed-metrics
  namespace: omniroute
  labels:
    app.kubernetes.io/name: omniroute
    app.kubernetes.io/component: routed
spec:
  selector:
    app.kubernetes.io/name: omniroute
    app.kubernetes.io/component: routed
  ports:
    - name: metrics
      port: 9100
      targetPort: metrics
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: omniroute-routed
  namespace: omniroute
  labels:
    app.kubernetes.io/name: omniroute
    app.kubernetes.io/component: routed
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: omniroute-routed
  namespace: omniroute
  labels:
    app.kubernetes.io/name: omniroute
    app.kubernetes.io/component: routed
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: omniroute-routed
  namespace: omniroute
  labels:
    app.kubernetes.io/name: omniroute
    app.kubernetes.io/component: routed
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: omniroute-routed
subjects:
  - kind: ServiceAccount
    name: omniroute-routed
