# deploy/vault-k8s-agent.yaml
#
# Kubernetes sidecar manifest for HashiCorp Vault agent injection.
#
# Deploys an OmniRoute pod with a Vault agent sidecar that authenticates
# to Vault via Kubernetes auth, retrieves secrets (API keys, tokens), and
# writes them to a shared emptyDir volume. The main OmniRoute container
# reads secrets from that volume at startup.
#
# Requirements:
#   - Vault server reachable from the cluster (VAULT_ADDR)
#   - Kubernetes auth method enabled on Vault
#   - vault-k8s-created service account annotated with Vault role
#   - kubectl 1.24+ / OpenShift 4.12+
#
# Usage:
#   kubectl apply -f deploy/vault-k8s-agent.yaml
#
# Configuration via ConfigMap (create before applying):
#   apiVersion: v1
#   kind: ConfigMap
#   metadata:
#     name: vault-agent-config
#     namespace: omniroute
#   data:
#     vault-addr: "https://vault.example.com:8200"
#     vault-role: "omniroute"
#     vault-tls-skip-verify: "false"
#     secret-path: "secret/data/omniroute"
#     secret-file-mode: "0440"
#
# Ref: https://developer.hashicorp.com/vault/docs/platform/k8s/injector
# Ref: https://developer.hashicorp.com/vault/docs/agent-and-proxy/agent

---
# ── Namespace ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: omniroute
  labels:
    app.kubernetes.io/name: omniroute
    app.kubernetes.io/component: gateway
    app.kubernetes.io/managed-by: vault-agent

---
# ── Service Account (for Vault Kubernetes auth) ───────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: omniroute-vault
  namespace: omniroute
  annotations:
    # Vault role bound to this service account via Kubernetes auth
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "omniroute"
  labels:
    app.kubernetes.io/name: omniroute
    app.kubernetes.io/component: vault-auth

---
# ── ConfigMap (overridable defaults) ──────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-agent-config
  namespace: omniroute
data:
  VAULT_ADDR: "https://vault.example.com:8200"
  VAULT_ROLE: "omniroute"
  VAULT_TLS_SKIP_VERIFY: "false"
  # Comma-separated list of secret paths to fetch.
  # Each path maps to a file in /vault/secrets/<sanitized-path>.
  VAULT_SECRET_PATHS: "secret/data/omniroute"
  # File mode for secrets written to disk (octal string)
  VAULT_SECRET_FILE_MODE: "0440"

---
# ── Deployment (OmniRoute + Vault Agent sidecar) ──────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omniroute
  namespace: omniroute
  labels:
    app.kubernetes.io/name: omniroute
    app.kubernetes.io/component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: omniroute
  template:
    metadata:
      labels:
        app: omniroute
        vault.hashicorp.com/agent-inject: "true"
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "omniroute"
        vault.hashicorp.com/agent-inject-secret-api-keys: "secret/data/omniroute"
        vault.hashicorp.com/agent-inject-template-api-keys: |
          {{- with secret "secret/data/omniroute" -}}
          {{- range $k, $v := .Data.data -}}
          export {{ $k }}="{{ $v }}"
          {{- end -}}
          {{- end -}}
    spec:
      serviceAccountName: omniroute-vault
      terminationGracePeriodSeconds: 30

      volumes:
        - name: shared-secrets
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: data
          emptyDir:
            sizeLimit: 8Gi

      initContainers:
        # Copy environment-loading script to the shared volume before
        # the main container starts. The main container can source this
        # to load Vault secrets as environment variables.
        - name: secrets-init
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p /shared
              cat > /shared/load-secrets.sh << 'SCRIPT'
              #!/bin/sh
              # Source this file to load Vault secrets as env vars.
              # Generated by vault-agent sidecar on $(date -u +%Y-%m-%dT%H:%M:%SZ).
              if [ -f /vault/secrets/api-keys ]; then
                . /vault/secrets/api-keys
              fi
              SCRIPT
              chmod +x /shared/load-secrets.sh
          volumeMounts:
            - name: shared-secrets
              mountPath: /shared

      containers:
        # ── Vault Agent Sidecar ────────────────────────────────────────
        - name: vault-agent
          image: hashicorp/vault:1.18
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 100
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: VAULT_ADDR
              valueFrom:
                configMapKeyRef:
                  name: vault-agent-config
                  key: VAULT_ADDR
                  optional: false
            - name: VAULT_ROLE
              valueFrom:
                configMapKeyRef:
                  name: vault-agent-config
                  key: VAULT_ROLE
                  optional: false
            - name: VAULT_TLS_SKIP_VERIFY
              valueFrom:
                configMapKeyRef:
                  name: vault-agent-config
                  key: VAULT_TLS_SKIP_VERIFY
                  optional: true
            - name: SKIP_CHOWN
              value: "true"
            - name: HOME
              value: "/home/vault"
          volumeMounts:
            - name: shared-secrets
              mountPath: /shared
          args:
            - agent
            - -config=/etc/vault-agent/vault-agent.hcl
            - -log-level=info
          livenessProbe:
            exec:
              command:
                - vault
                - status
                - -tls-skip-verify
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

        # ── OmniRoute Main ─────────────────────────────────────────────
        - name: omniroute
          image: ghcr.io/kooshapari/omniroute:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http-api
              containerPort: 3001
              protocol: TCP
            - name: mcp-sse
              containerPort: 3002
              protocol: TCP
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=4096"
            - name: DATA_DIR
              value: "/app/data"
            - name: VAULT_SECRETS_DIR
              value: "/shared"
            # Load Vault secrets at startup via init script
            - name: BASH_ENV
              value: "/shared/load-secrets.sh"
            - name: REQUIRE_API_KEY
              value: "true"
          envFrom:
            - secretRef:
                name: omniroute-env
                optional: true
          volumeMounts:
            - name: shared-secrets
              mountPath: /shared
              readOnly: true
            - name: data
              mountPath: /app/data
          startupProbe:
            httpGet:
              path: /v1/models
              port: http-api
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /v1/models
              port: http-api
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /v1/models
              port: http-api
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 4
              memory: 4Gi

---
# ── Service ───────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: omniroute
  namespace: omniroute
  labels:
    app.kubernetes.io/name: omniroute
spec:
  selector:
    app: omniroute
  ports:
    - name: http-api
      port: 80
      targetPort: http-api
      protocol: TCP
    - name: mcp-sse
      port: 3002
      targetPort: mcp-sse
      protocol: TCP
  type: ClusterIP
