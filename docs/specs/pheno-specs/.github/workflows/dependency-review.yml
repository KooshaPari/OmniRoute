name: Dependency Review
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
      - uses: actions/dependency-review-action@5a2c0e3b3a530a7e5b17a9a1e32f2dc1b5d55b8c # v4.5.0
        with:
          fail-on-severity: high
