# PhenoSpecs Registry Index
# Spec <-> implementation traceability index.
# Format: YAML 1.2
#
# Authority: the canonical ECOSYSTEM index (repo roles + dependency graph) is
# phenotype-registry/ECOSYSTEM_MAP.md. THIS file is the spec<->impl traceability
# index only. The `domains:` block below mirrors ECOSYSTEM_MAP's role taxonomy
# (SDK kits are standalone repos; shared crates live in `pheno`/`HexaKit`) and
# replaces the earlier fictional PhenoKit/AuthKit/DataKit monorepo-workspace
# layout (paths like PhenoKit/rust/PhenotypeCore never existed).

registry_version: "2.0.0"
last_updated: "2026-06-17"
ecosystem_index: "https://github.com/KooshaPari/phenotype-registry/blob/main/ECOSYSTEM_MAP.md"

# PhenoSpecs System Entry
system:
  id: phenospecs-001
  title: "PhenoSpecs — Unified Specification Registry"
  spec: "SPEC.md"
  research: "RESEARCH.md"
  status: specified

# --- DOMAIN CLASSIFICATIONS ---
# Mirrors phenotype-registry/ECOSYSTEM_MAP.md role taxonomy (generated 2026-05-30).
# SDK kits are standalone repos (not workspace subdirs); shared crates live in
# the `pheno` monorepo and `HexaKit`. See ecosystem_index above for the
# authoritative repo roster + dependency graph.
domains:
  sdk_kits:
    name: "SDK Kits (per-domain SDK surface)"
    role: SDK            # ECOSYSTEM_MAP role: SDK
    repos:
      - "AuthKit"            # auth/security SDK
      - "DataKit"            # data storage & event sourcing SDK
      - "McpKit"             # Model Context Protocol SDK
      - "ObservabilityKit"   # observability/telemetry SDK
      - "ResilienceKit"      # resilience/reliability SDK
      - "TestingKit"         # testing/QA SDK
      - "PlatformKit"        # platform SDK
      - "PhenoKits"          # aggregate kit umbrella
      - "HexaKit"            # hexagonal infra toolkit
    specs: [SPEC-AUTH-001, SPEC-AUTH-002, SPEC-CRYPTO-001, SPEC-CRYPTO-002, SPEC-DATA-001, SPEC-CACHE-001, SPEC-OBS-001, SPEC-RESILIENCE-001, SPEC-TEST-001, SPEC-MCP-001]

  shared_lib:
    name: "Shared libraries (foundation crates/packages)"
    role: shared-lib     # ECOSYSTEM_MAP role: shared-lib
    repos:
      - "pheno"              # shared crates monorepo (phenotype-core, errors, contracts, ...)
      - "phenoShared"        # @phenotype/shared-utils + Rust crates
      - "phenoUtils"         # primitives tier (NOT a peer SDK — see ADR-011)
      - "phenoXddLib"
      - "Authvault"
      - "Stashly"
      - "Settly"
      - "Traceon"
      - "PhenoObservability"
      - "PhenoVCS"
      - "phenotype-auth-ts"
    specs: [SPEC-CORE-001, SPEC-VALIDATION-001]

  cli_tooling:
    name: "CLI & tooling"
    role: tooling        # ECOSYSTEM_MAP role: tooling
    repos: ["pheno", "AgilePlus", "phenotype-tooling", "phenotype-dep-guard", "phenotype-runs"]
    specs: [SPEC-CLI-001, SPEC-RUNS-001]

  agent_runtime:
    name: "Agent runtime & frameworks"
    role: agent-runtime  # ECOSYSTEM_MAP role: agent-runtime
    repos: ["Agentora", "thegent", "PhenoAgent", "PhenoProc"]
    specs: [SPEC-AGENT-001]

  governance_spine:
    name: "Spec/governance spine (4-role split)"
    role: docs
    repos: ["phenotype-registry", "PhenoSpecs", "PhenoHandbook", "phenotype-org-governance"]
    note: "registry=INDEX, PhenoSpecs=ADRs/contracts, PhenoHandbook=CONVENTIONS, governance=ENFORCEMENT"

# --- SPECIFICATIONS INDEX ---
specs:
  # Authentication Domain
  SPEC-AUTH-001:
    title: "OAuth 2.0 + PKCE Implementation"
    path: "specs/auth/oauth-pkce/spec.md"
    domain: auth
    status: implemented
    implements: [SPEC-AUTH-002, SPEC-CRYPTO-001]
    repos: ["phenotype-auth-ts"]
    frd: "specs/auth/oauth-pkce/frd.md"
    openapi: "openapi/auth-oauth.yaml"

  SPEC-AUTH-002:
    title: "JWT Token Management"
    path: "specs/auth/jwt-management/spec.md"
    domain: auth
    status: implemented
    repos: ["phenotype-auth-ts"]
    frd: "specs/auth/jwt-management/frd.md"

  # Cryptography Domain
  SPEC-CRYPTO-001:
    title: "Symmetric Encryption (AES-GCM)"
    path: "specs/crypto/aes-gcm/spec.md"
    domain: crypto
    status: implemented
    repos: ["phenotype-cipher"]
    frd: "specs/crypto/aes-gcm/frd.md"

  SPEC-CRYPTO-002:
    title: "Asymmetric Encryption (RSA/ECDH)"
    path: "specs/crypto/rsa-ecdh/spec.md"
    domain: crypto
    status: specified
    repos: ["phenotype-cipher"]
    frd: "specs/crypto/rsa-ecdh/frd.md"

  # Caching Domain
  SPEC-CACHE-001:
    title: "Multi-Tier Cache Architecture"
    path: "specs/caching/multi-tier/spec.md"
    domain: caching
    status: implemented
    repos: ["Stashly"]
    frd: "specs/caching/multi-tier/frd.md"

  # Observability Domain
  SPEC-OBS-001:
    title: "Distributed Tracing with OpenTelemetry"
    path: "specs/observability/distributed-tracing/spec.md"
    domain: observability
    status: implemented
    repos: ["Tracely"]
    frd: "specs/observability/distributed-tracing/frd.md"

  # CLI Domain
  SPEC-CLI-001:
    title: "Unified CLI Interface"
    path: "specs/cli/unified-interface/spec.md"
    domain: cli
    status: implemented
    repos: ["pheno", "AgilePlus"]
    frd: "specs/cli/unified-interface/frd.md"

  SPEC-RUNS-001:
    title: "phenotype-runs CI/job observability substrate"
    path: "specs/phenotype-runs.md"
    domain: cli
    status: specified
    repos: ["phenotype-runs"]
    requirements: [FR-PRUN-001, FR-PRUN-002, FR-PRUN-003, FR-PRUN-004, FR-PRUN-005, FR-PRUN-006, FR-PRUN-007, FR-PRUN-008, NFR-PRUN-001, NFR-PRUN-002, NFR-PRUN-003]

  # Agents Domain
  SPEC-AGENT-001:
    title: "Agent Orchestration Protocol"
    path: "specs/agents/orchestration-protocol/spec.md"
    domain: agents
    status: implementing
    repos: ["thegent"]
    frd: "specs/agents/orchestration-protocol/frd.md"

  SPEC-MCP-001:
    title: "MCP Polyrepo Boundaries"
    path: "specs/mcp/polyrepo-boundaries/spec.md"
    domain: mcp
    status: specified
    repos:
      - PhenoMCPServers
      - PhenoFastMCP
      - PhenoFastMCP-go
      - PhenoFastMCP-rust
      - PhenoRMCP
      - substrate
    adr: ADR-017

  SPEC-MCP-002:
    title: "Agent pre-flight (MCP fleet)"
    path: "specs/mcp/agent-pre-flight/spec.md"
    domain: mcp
    status: specified
    repos:
      - PhenoMCPServers
      - phenodag
      - PhenoSpecs
    adr: ADR-018

  SPEC-MCP-003:
    title: "Catalog wiring"
    path: "specs/mcp/catalog-wiring/spec.md"
    domain: mcp
    status: specified
    repos:
      - PhenoMCPServers
    adr: ADR-017

