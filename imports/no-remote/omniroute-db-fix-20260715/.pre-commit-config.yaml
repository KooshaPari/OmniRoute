# Pre-commit configuration — OmniRoute
# Fleet hygiene standard

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key
      - id: mixed-line-ending

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npx eslint --fix --no-error-on-unmatched-pattern
        language: system
        types: [javascript, jsx, ts, tsx, mjs]
        pass_filenames: true
      - id: prettier
        name: prettier
        entry: npx prettier --write
        language: system
        types: [javascript, jsx, ts, tsx, mjs, json, markdown, yaml, css]
        pass_filenames: true
      - id: check-cycles
        name: circular dependency check
        entry: npm run check:cycles
        language: system
        pass_filenames: false
        always_run: true
