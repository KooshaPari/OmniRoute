# qgate configuration for OmniRoute.
#
# Adopted via the "1 via 2" protocol (gate-first-red-then-backfill).
# `continue-on-error: true` in the workflow until per-module coverage
# reaches the threshold — flip to blocking once backfilled.

coverage_threshold = 60.0

# lcov generated by npm run test:coverage in the workflow.
coverage_path = "coverage/lcov.info"
coverage_format = "lcov"

# OmniRoute: TS/JS monorepo with UI, e2e tests, OpenAPI spec published.
# All spectrum gates are exercised: coverage, a11y (playwright), e2e, dast.
# Mutation testing is wired (nightly via stryker).
not_applicable = []
