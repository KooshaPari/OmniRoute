# cargo-deny configuration for phenotype-registry
# https://embarkstudios.github.io/cargo-deny/

[dependencies]
warn-on-unused = true

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
]
deny = []
unlicensed = "deny"

[licenses.private]
ignore = true

[bans]
multiple-versions = "deny"
wildcard-dependencies = "allow"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []

[advisories]
ignore = []
