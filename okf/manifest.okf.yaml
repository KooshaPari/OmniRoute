okf_version: "1.0"
project:
  id: koosha.phenotype.phenotype-registry
  name: phenotype-registry
  charter_ref: "charter.md"
  review_ref: "review.md"
artifacts:
  - id: intent-root
    path: intent.md
    kind: intent
    summary: "Fleet index, domain roles, archive reconcile authority"
    links:
      - docs/intent/synthesis.md
      - docs/intent/assumptions.md
  - id: charter
    path: charter.md
    kind: governance
    summary: "Genesis-index; DOMAIN_ROLES and ECOSYSTEM_MAP authority"
  - id: review-kilo
    path: review.md
    kind: review
    standard: kilo-code-stand@1
    summary: "Automated PR review contract for agents"
  - id: sota-root
    path: SOTA.md
    kind: sota
    summary: "Polyrepo rationalization and zero-loop AX strategy"
    dimensions:
      - technical
      - dx
      - ux
      - ax
      - security
      - ops
      - cost
  - id: substrate-catalog
    path: catalog/registry.yaml
    kind: registry
    summary: "Machine-readable substrate catalog (ADR-ECO-017)"
    links:
      - catalog/registry.schema.json
      - scripts/validate-catalog.py
      - .github/workflows/registry-validate.yml
      - docs/adrs/ADR-ECO-017-substrate-schema-conventions.md
  - id: substrate-schema
    path: catalog/registry.schema.json
    kind: schema
    summary: "JSON Schema for catalog/registry.yaml entries"
dimensions:
  technical: docs/sota/technical.md
  dx: docs/sota/dx.md
  ux: docs/sota/ux.md
  ax: docs/sota/ax.md
  security: docs/sota/security.md
  ops: docs/sota/ops.md
  cost: docs/sota/cost.md
  alternatives: docs/sota/alternatives.md
  fork: docs/sota/fork-rationale.md
provenance:
  intent_prompts: docs/intent/prompts/
  last_scrape: "2026-06-17"
  sources:
    - cursor
    - forge
    - claude
    - codex
llm_wiki:
  chunk_max_tokens: 800
  cross_link_style: relative
  embedding_hint: "title + summary + first_h2"
  injection_order:
    - charter.md
    - review.md
    - intent.md
    - SOTA.md
