[workspace]
resolver = "2"
members = [
    "crates/omniroute-core",
    "crates/omniroute-provider",
    "crates/omniroute-runtime",
]

# Future members (Phase 3):
# "crates/omniroute-bindings",

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
license = "MIT OR Apache-2.0"
repository = "https://github.com/KooshaPari/OmniRoute"

[workspace.dependencies]
# Async runtime (runtime-only)
tokio = { version = "1", features = ["full"] }

# HTTP (runtime-only)
hyper = { version = "1", features = ["server", "http1", "http2"] }
hyper-util = { version = "0.1", features = ["server", "tokio"] }
http = "1"
http-body-util = "0.1"

# HTTP client (provider-only)
reqwest = { version = "0.12", features = ["json", "stream", "rustls-tls"], default-features = false }

# Async traits
async-trait = "0.1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Errors
thiserror = "1"
anyhow = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Time
chrono = { version = "0.4", features = ["serde"] }

# Misc
uuid = { version = "1", features = ["v4", "serde"] }
rand = "0.8"
url = "2"
percent-encoding = "2"
bytes = "1"
once_cell = "1"

# Internal crates
omniroute-core = { path = "crates/omniroute-core", version = "0.1.0" }
omniroute-provider = { path = "crates/omniroute-provider", version = "0.1.0" }

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "symbols"
panic = "abort"

[profile.bench]
opt-level = 3
debug = true

[profile.dev]
opt-level = 0
debug = true