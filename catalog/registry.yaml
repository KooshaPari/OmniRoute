# catalog/registry.yaml — Phenotype substrate catalog
#
# CANONICAL machine-readable catalog of OWNED Phenotype-org repos.
# Realigned 2026-06-28 to current owned-repo reality (88 owned repos,
# verified against `gh repo list KooshaPari`). See
# docs/ECOSYSTEM_MAP_REALIGNMENT.md for the full change log.
#
# Scope: this catalog lists the 88 OWNED repos under the Phenotype
# Ownership Program. EXCLUDED (other-owner / paused / niche):
#   AgilePlus, Tracera, Civis, Dino, WorldSphereMod, Compound-Spheres-3D*,
#   QuadSGM, Parpoura, KaskMan, GDK, AtomsBot, KWatch, eyetracker,
#   agent-user-status. These are intentionally NOT catalog entries.
#
# Per-entry fields (ADR-ECO-017):
#   - tier        — pheno-lib | phenotype-sdk | phenotype-framework |
#                   federated-service. Required.
#   - archetype   — coarse repo shape (library|sdk|cli|service|app|
#                   contract|spec|docs|infra|plugin|tooling|fork-tool|
#                   monorepo|landing). Realignment-added, free-form.
#   - architecture — required only when tier=phenotype-framework.
#   - ports/adapters — required only when architecture=hexagonal-l4.
#   - language    — primary impl language.
#   - role        — domain role per DOMAIN_ROLES.md.
#
# Schema: catalog/registry.schema.json
# Validator: scripts/validate-catalog.py
# CI: .github/workflows/registry-validate.yml
# ADR: docs/adrs/ADR-ECO-017-substrate-schema-conventions.md
