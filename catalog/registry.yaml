      HTML). The literal `cp -r phenotype-landing/* phenodocs/packages/landing/`
      would have copied 7 independent Astro sites (each with its own
      `package.json` + `bun.lock` + `vercel.json` + `.github/workflows/ci.yml`)
      into a VitePress federation hub — architecturally mismatched. Each site
      deploys independently to Vercel; no shared CI/build path. Per the task
      failsafe clause ("ARCHIVE_ONLY + boundary doc if build is heavy or
      conflicts exist"), disposition pivoted to ARCHIVE_ONLY. Source repo
      archived on GitHub via `gh repo archive KooshaPari/phenotype-landing`.
      Forward-pointer at `phenodocs/packages/landing/` (no code copied; pointer
      README only). [ABSORBED 2026-07-17]

