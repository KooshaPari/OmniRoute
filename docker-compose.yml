# ──────────────────────────────────────────────────────────────────────
#  OmniRoute — Docker Compose (Phase 7 Production GA)
# ──────────────────────────────────────────────────────────────────────
#
#  Profiles:
#    base  → minimal image, no CLI tools
#    web   → runner-web (+Chromium/Playwright) for web-cookie providers
#    cli   → CLIs installed inside the container (portable)
#    host  → runner-base + host-mounted CLI binaries (Linux-first)
#    cliproxyapi → CLIProxyAPI sidecar on port 8317
#
#  Non-profile services (always up):
#    redis             → rate-limiter backend
#    otel-collector    → OTLP gRPC collector → Tempo/Prometheus/Grafana
#    omniroute-routed  → Rust data plane (UDS socket, T2 hot path)
#
#  Usage:
#    docker compose --profile base up -d
#    docker compose --profile cli --profile cliproxyapi up -d
#    docker compose --profile base -f docker-compose.yml up -d
#
#  Before first run, copy .env.example → .env and edit your secrets.
# ──────────────────────────────────────────────────────────────────────

x-common: &common
  restart: unless-stopped
  stop_grace_period: 40s
  env_file: .env
  environment:
    - DATA_DIR=/app/data
    - PORT=${PORT:-20128}
    - DASHBOARD_PORT=${DASHBOARD_PORT:-20128}
    - API_PORT=${API_PORT:-20129}
    - API_HOST=${API_HOST:-0.0.0.0}
    - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    - OTEL_SERVICE_NAME=omniroute
    - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
  volumes:
    - ./data:/app/data
  healthcheck:
    test: ["CMD", "node", "healthcheck.mjs"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 15s

services:
  # ── Redis (Rate Limiter Backend) ──────────────────────────────────
  redis:
    image: docker.io/library/redis:7-alpine
    container_name: omniroute-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── OpenTelemetry Collector ───────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.0
    container_name: omniroute-otel-collector
    restart: unless-stopped
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317" # OTLP gRPC
      - "${OTEL_HTTP_PORT:-4318}:4318" # OTLP HTTP
    volumes:
      - ./deploy/k8s/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:4317"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Rust Data Plane (T2 UDS hot path) ─────────────────────────────
  omniroute-routed:
    image: omniroute-routed:latest
    container_name: omniroute-routed
    build:
      context: .
      dockerfile: Dockerfile.routed
      target: routed-release
    restart: unless-stopped
    ports:
      - "${ROUTED_METRICS_PORT:-9091}:9091" # Prometheus /metrics
    volumes:
      - routed-data:/tmp/omniroute
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - XDG_RUNTIME_DIR=/tmp/omniroute
      - OMNIROUTE_DATA_PLANE_SOCKET=/tmp/omniroute/routed.sock
      - OTEL_SERVICE_NAME=omniroute-routed
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9091/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      otel-collector:
        condition: service_started

  # ── Profile: base (minimal, no CLI tools) ──────────────────────────
  omniroute-base:
    <<: *common
    container_name: omniroute
    build:
      context: .
      target: runner-base
    image: omniroute:base
    ports:
      - "${DASHBOARD_PORT:-20128}:${DASHBOARD_PORT:-20128}"
      - "${API_PORT:-20129}:${API_PORT:-20129}"
    profiles:
      - base

  # ── Profile: web (runner-web + Chromium/Playwright) ────────────────
  omniroute-web:
    <<: *common
    container_name: omniroute
    build:
      context: .
      target: runner-web
    image: omniroute:web
    ports:
      - "${DASHBOARD_PORT:-20128}:${DASHBOARD_PORT:-20128}"
      - "${API_PORT:-20129}:${API_PORT:-20129}"
    profiles:
      - web

  # ── Profile: cli (CLIs installed inside container) ─────────────────
  omniroute-cli:
    <<: *common
    container_name: omniroute
    build:
      context: .
      target: runner-cli
    image: omniroute:cli
    ports:
      - "${DASHBOARD_PORT:-20128}:${DASHBOARD_PORT:-20128}"
      - "${API_PORT:-20129}:${API_PORT:-20129}"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/libexec/docker/cli-plugins:/usr/libexec/docker/cli-plugins:ro
      - ${AUTO_UPDATE_HOST_REPO_DIR:-.}:/workspace/omniroute:rw
    profiles:
      - cli

  # ── Profile: host (host-mounted CLI binaries, Linux-first) ────────
  omniroute-host:
    <<: *common
    container_name: omniroute
    build:
      context: .
      target: runner-base
    image: omniroute:base
    ports:
      - "${DASHBOARD_PORT:-20128}:${DASHBOARD_PORT:-20128}"
      - "${API_PORT:-20129}:${API_PORT:-20129}"
    environment:
      - DATA_DIR=/app/data
      - PORT=${PORT:-20128}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-20128}
      - API_PORT=${API_PORT:-20129}
      - API_HOST=${API_HOST:-0.0.0.0}
      - CLI_MODE=host
      - CLI_EXTRA_PATHS=/host-local/bin:/host-node/bin
      - CLI_CONFIG_HOME=/host-home
      - CLI_ALLOW_CONFIG_WRITES=true
    volumes:
      - ./data:/app/data
      - ~/.local/bin:/host-local/bin:ro
      - ~/.codex:/host-home/.codex:rw
      - ~/.claude:/host-home/.claude:rw
      - ~/.factory:/host-home/.factory:rw
      - ~/.openclaw:/host-home/.openclaw:rw
      - ~/.cursor:/host-home/.cursor:rw
      - ~/.config/cursor:/host-home/.config/cursor:rw
    profiles:
      - host

  # ── Profile: cliproxyapi (CLIProxyAPI as sidecar) ─────────────────
  cliproxyapi:
    container_name: cliproxyapi
    image: ghcr.io/router-for-me/cliproxyapi:v6.9.7
    restart: unless-stopped
    ports:
      - "${CLIPROXYAPI_PORT:-8317}:${CLIPROXYAPI_PORT:-8317}"
    volumes:
      - cliproxyapi-data:/root/.cli-proxy-api
    environment:
      - PORT=${CLIPROXYAPI_PORT:-8317}
      - HOST=0.0.0.0
    healthcheck:
      test:
        ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:${CLIPROXYAPI_PORT:-8317}/v1/models"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - cliproxyapi

volumes:
  cliproxyapi-data:
    name: cliproxyapi-data
  redis-data:
    name: omniroute-redis-data
  routed-data:
    name: omniroute-routed-data
