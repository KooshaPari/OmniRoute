services:
  gateway:
    build: { context: ., dockerfile: Dockerfile }
    environment:
      PUBLIC_WEB_URL: http://localhost:5173
      KBRIDGE_SOCKET: /var/run/omniroute/gateway.sock
    ports:
      - "20128:20128"
    volumes:
      - gateway-data:/root/.omniroute

  web:
    image: node:22.10.0-bookworm-slim
    working_dir: /repo
    command: ["pnpm", "--filter", "web", "dev", "--host", "0.0.0.0"]
    environment:
      PUBLIC_WEB_URL: http://localhost:5173
      PUBLIC_GATEWAY_URL: http://gateway:20128
    ports:
      - "5173:5173"
    volumes:
      - ./:/repo
    depends_on: [gateway]

  desktop:
    image: node:22.10.0-bookworm-slim
    working_dir: /repo
    command: ["pnpm", "--filter", "desktop", "tauri", "dev"]
    environment:
      PUBLIC_WEB_URL: http://localhost:5173
    volumes:
      - ./:/repo
    depends_on: [web, gateway]

volumes:
  gateway-data:
