<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Melosviz — melody &amp; music visualization">
  <defs>
    <linearGradient id="mv-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1116"/>
      <stop offset="1" stop-color="#090a0c"/>
    </linearGradient>
    <linearGradient id="mv-wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ec4899"/>
      <stop offset="0.5" stop-color="#f472b6"/>
      <stop offset="1" stop-color="#7ebab5"/>
    </linearGradient>
    <linearGradient id="mv-pink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ec4899"/>
      <stop offset="1" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="mv-teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7ebab5"/>
      <stop offset="1" stop-color="#3a8d87"/>
    </linearGradient>
    <radialGradient id="mv-glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#ec4899" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <filter id="mv-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#mv-bg)"/>
  <circle cx="256" cy="256" r="220" fill="url(#mv-glow)"/>

  <!-- center axis line -->
  <line x1="80" y1="256" x2="432" y2="256" stroke="#7ebab5" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- LEFT half: classic audio waveform (sine peaks) -->
  <g>
    <!-- bar 1 -->
    <rect x="96"  y="216" width="14" height="80" rx="4" fill="url(#mv-pink)" opacity="0.95"/>
    <!-- bar 2 -->
    <rect x="118" y="180" width="14" height="152" rx="4" fill="url(#mv-pink)" opacity="0.95"/>
    <!-- bar 3 -->
    <rect x="140" y="148" width="14" height="216" rx="4" fill="url(#mv-pink)" opacity="0.9"/>
    <!-- bar 4 -->
    <rect x="162" y="124" width="14" height="264" rx="4" fill="url(#mv-pink)" opacity="0.9"/>
    <!-- bar 5 -->
    <rect x="184" y="156" width="14" height="200" rx="4" fill="url(#mv-pink)" opacity="0.85"/>
    <!-- bar 6 -->
    <rect x="206" y="200" width="14" height="112" rx="4" fill="url(#mv-pink)" opacity="0.85"/>
    <!-- bar 7 -->
    <rect x="228" y="232" width="14" height="48"  rx="4" fill="url(#mv-pink)" opacity="0.8"/>
  </g>

  <!-- smooth sine envelope -->
  <path d="M 96 256
           Q 125 156, 154 200
           Q 183 88, 212 200
           Q 240 232, 256 256"
        fill="none" stroke="url(#mv-wave)" stroke-width="3" opacity="0.7"/>

  <!-- RIGHT half: crystallized polygon/diamond -->
  <g filter="url(#mv-shadow)">
    <!-- big diamond -->
    <polygon points="256,256 344,176 432,256 344,336" fill="url(#mv-teal)" stroke="#7ebab5" stroke-width="2"/>
    <!-- inner facets -->
    <polygon points="256,256 344,176 344,256" fill="#a7d4cf" fill-opacity="0.25"/>
    <polygon points="256,256 344,256 344,336" fill="#3a8d87" fill-opacity="0.4"/>
    <polygon points="256,256 432,256 344,256" fill="#5ba39d" fill-opacity="0.3"/>
  </g>

  <!-- mirror bars on right (lower opacity, becoming polygons) -->
  <g>
    <rect x="256" y="240" width="14" height="32"  rx="4" fill="url(#mv-teal)" opacity="0.5"/>
    <rect x="278" y="216" width="14" height="80"  rx="4" fill="url(#mv-teal)" opacity="0.55"/>
    <rect x="300" y="192" width="14" height="128" rx="4" fill="url(#mv-teal)" opacity="0.6"/>
    <rect x="322" y="176" width="14" height="160" rx="4" fill="url(#mv-teal)" opacity="0.7"/>
    <rect x="344" y="168" width="14" height="176" rx="4" fill="url(#mv-teal)" opacity="0.85"/>
    <rect x="366" y="176" width="14" height="160" rx="4" fill="url(#mv-teal)" opacity="0.7"/>
    <rect x="388" y="192" width="14" height="128" rx="4" fill="url(#mv-teal)" opacity="0.6"/>
    <rect x="410" y="216" width="14" height="80"  rx="4" fill="url(#mv-teal)" opacity="0.55"/>
  </g>

  <!-- music note (top corner) -->
  <g transform="translate(376 96)">
    <line x1="0" y1="0" x2="0" y2="36" stroke="#ec4899" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="22" y2="-8" stroke="#ec4899" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="-6" cy="38" rx="10" ry="7" fill="#ec4899" transform="rotate(-20 -6 38)"/>
  </g>

  <!-- bottom corner dots (rhythm ticks) -->
  <g fill="#7ebab5" opacity="0.5">
    <circle cx="120" cy="380" r="3"/>
    <circle cx="160" cy="380" r="3"/>
    <circle cx="200" cy="380" r="3"/>
    <circle cx="240" cy="380" r="3"/>
    <circle cx="280" cy="380" r="3"/>
    <circle cx="320" cy="380" r="3"/>
    <circle cx="360" cy="380" r="3"/>
    <circle cx="400" cy="380" r="3"/>
  </g>
</svg>