<?xml version="1.0" encoding="UTF-8"?>
<!--
  sharecli brand icon — Animated motion variant (vision-pillar L101).
  Companion to the static sharecli-icon.svg.
  Animation: subtle 4s pulse on the dominant pulse-green arc (#3fb950),
  plus a slow counter-rotation of the inner chevron group.
  Native SMIL — no JavaScript, no external CSS.
  Loop: last frame == first frame (seamless 4s loop).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="sharecli (animated)">
  <title>sharecli — animated</title>
  <desc>Backbone-2 mark with subtle pulse-green heartbeat on the chevron arc.</desc>

  <defs>
    <radialGradient id="sharecli-panel-glow" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#1d2530" stop-opacity="1"/>
      <stop offset="65%" stop-color="#161b22" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0d12" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="sharecli-pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#3fb950" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="sharecli-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="0" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Panel -->
  <rect width="1024" height="1024" rx="184" ry="184" fill="url(#sharecli-panel-glow)"/>

  <!-- Outer hex frame (static) -->
  <polygon points="512,128 832,320 832,704 512,896 192,704 192,320"
           fill="none" stroke="#3fb950" stroke-opacity="0.35" stroke-width="14" stroke-linejoin="round"/>

  <!-- Animated chevron stack — counter-rotation 4s -->
  <g transform-origin="512 512">
    <animateTransform attributeName="transform" attributeType="XML"
                      type="rotate" from="0 512 512" to="-360 512 512"
                      dur="4s" repeatCount="indefinite"/>
    <polygon points="512,256 720,512 512,768 304,512"
             fill="none" stroke="url(#sharecli-pulse)" stroke-width="22" stroke-linejoin="round">
      <!-- Pulse heartbeat on stroke opacity -->
      <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="512,360 624,512 512,664 400,512"
             fill="#3fb950" fill-opacity="0.18" stroke="#3fb950" stroke-width="10" stroke-linejoin="round">
      <animate attributeName="fill-opacity" values="0.12;0.32;0.12" dur="4s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Center node (static) -->
  <circle cx="512" cy="512" r="22" fill="#3fb950"/>
</svg>