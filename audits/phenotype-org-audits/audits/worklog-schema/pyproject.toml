[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pheno-worklog-schema"
version = "0.4.0"
description = "WORKLOG.md parser/emitter/migrator for ADR-015 v2.0 + v2.1 schemas."
readme = "README.md"
license = { text = "MIT OR Apache-2.0" }
authors = [{ name = "Phenotype contributors" }]
requires-python = ">=3.10"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Documentation",
]
dependencies = ["structlog>=24.1.0"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.5.0"]

[project.scripts]
pheno-worklog-schema = "pheno_worklog_schema.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["src/pheno_worklog_schema"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
