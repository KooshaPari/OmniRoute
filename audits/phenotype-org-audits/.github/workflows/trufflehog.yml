name: Trufflehog Secrets Scan
on:
  push:
    branches: [main]
  pull_request:

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      # Canonical TruffleHog action (filesystem scan of the checkout). The prior
      # `trufflehog/actions/setup@main` step referenced a non-existent action
      # ("Unable to resolve action trufflehog/actions, repository not found"),
      # which failed the job on every run including main.
      - uses: trufflesecurity/trufflehog@3fc0c2aa6648d54242e4af6fbfde0701796e4fb0
        with:
          path: ./
          extra_args: --only-verified
