# pheno-errors — cargo-nextest profile (v14 T6: L34 dev-loop time 2→3)
# Migrated from `cargo test --workspace` to `cargo nextest run --profile ci`.
# Reference: plans/2026-06-20-v14-71-pillar-cycle-3-p0.md (Track T6).

[profile.default]
test-threads = 4
slow-test-timeout = { period = "60s", terminate-after = 2 }
failure-output = "immediate-final"
junit = { path = "target/nextest/default/junit.xml" }

[profile.ci]
inherits = "default"
test-threads = 8
retries = 1
fail-fast = false
