repos:
  - repo: local
    hooks:
      - id: secret-guard
        name: secret guard
        entry: python scripts/secret-guard.py
        language: system
        pass_filenames: true
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
