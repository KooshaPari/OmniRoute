# Taskfile.yml — phenotype-registry ecosystem validation
# This file is a parallel entry point to Justfile so that fleet tooling
# which expects `task <recipe>` can run the same validate recipe.
#
# Recipes:
#   validate     — Run scripts/validate-ecosystem.sh against the 13 canonical repos
#   validate:json — Same, machine-readable JSON output
#   help         — List available recipes

version: '3'

vars:
  SCRIPT: scripts/validate-ecosystem.sh

tasks:
  default:
    desc: List available recipes
    cmds:
      - task --list

  help:
    desc: Show help for the validate script
    cmds:
      - '{{.SCRIPT}} --help'

  validate:
    desc: Validate all 13 canonical KooshaPari repos for GitHub reachability and meta-file presence
    cmds:
      - '{{.SCRIPT}}'

  validate:json:
    desc: Same as validate, but machine-readable JSON output
    cmds:
      - '{{.SCRIPT}} --json'

  validate:no-color:
    desc: Validate without ANSI color codes (for CI logs)
    cmds:
      - '{{.SCRIPT}} --no-color'

  coverage:
    desc: "Measure code coverage (SSOT: see grade.sh for the canonical command)."
    cmds:
      - |
        if [[ -f "Cargo.toml" ]]; then
          cargo llvm-cov --workspace --fail-under-lines 85
        elif [[ -f "package.json" ]]; then
          npx jest --coverage --coverageThreshold='{"global":{"branches":85,"functions":85,"lines":85,"statements":85}}'
        elif [[ -f "pyproject.toml" || -f "setup.py" ]]; then
          pytest --cov=src --cov-report=term-missing --cov-fail-under=85
        elif [[ -f "go.mod" ]]; then
          go test -coverprofile=coverage.out -covermode=atomic ./... && go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//' | awk '{exit($1 < 85 ? 1 : 0)}'
        else
          echo "No recognized stack (Cargo.toml / package.json / pyproject.toml / go.mod) found." >&2
          exit 1
        fi
