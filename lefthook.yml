pre-commit:
  parallel: true
  commands:
    oxlint:
      glob: "*.{ts,tsx,js,svelte}"
      run: pnpm lint:fix
    oxfmt:
      glob: "*.{ts,tsx,js,svelte,json,md}"
      run: oxfmt {staged_files}
    cargo-fmt:
      run: cargo fmt --all
    cargo-clippy:
      run: cargo clippy --all-targets -- -D warnings
